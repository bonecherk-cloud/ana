  border-color:var(--border-strong);
  transform:translateY(-2px);
}


/* PAGE STARS CANVAS */
.page-stars-canvas,#starsCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;display:block;
}
#app{position:relative;z-index:auto;background:transparent;}
.header{z-index:1000;}

/* ADMIN SAVE STATUS */
.save-status{display:flex;align-items:center;gap:6px;font-size:0.7rem;font-weight:500;letter-spacing:0.05em;padding:6px 12px;border-radius:4px;transition:all .3s ease}
.save-status.saving{color:#a0a0a0}
.save-status.saved{color:#4caf50}
.save-status.error{color:#f44336}
.save-status i{font-size:10px}

/* BACK BUTTON - DETAIL PAGE */
.detail-back-btn{
  padding:20px 40px 0;max-width:1440px;margin:0 auto;
}
.detail-back-btn button{
  background:#fff;
  border:1px solid #ddd;
  border-radius:0;
  color:#000;
  padding:10px 20px;
  font-size:12px;
  font-weight:600;
  font-family:var(--font);
  display:inline-flex;align-items:center;gap:8px;
  cursor:pointer;
  transition:all .2s ease;
  box-shadow:none;
}
.detail-back-btn button:hover{
  background:#000;
  color:#fff;
  border-color:#000;
  transform:translateX(-3px);
}

/* EXCLUSIVE DETAIL THEME */
#page-detail.exclusive-theme{background:#0a0a0a!important}
#page-detail.exclusive-theme .detail-back-btn button{background:transparent;border-color:rgba(212,175,55,.4);color:#d4af37}
#page-detail.exclusive-theme .detail-back-btn button:hover{background:#d4af37;color:#000;border-color:#d4af37;transform:translateX(-3px)}
#page-detail.exclusive-theme .pd-gallery{background:#111}
#page-detail.exclusive-theme .pd-info h1{color:#fff}
#page-detail.exclusive-theme .pd-info .pd-price{color:#d4af37;font-size:1.8rem}
#page-detail.exclusive-theme .pd-info .pd-desc{color:#aaa}
#page-detail.exclusive-theme .pd-info .pd-cat{color:#d4af37;font-weight:600;letter-spacing:0.15em}
#page-detail.exclusive-theme .pd-installments{color:#888}
#page-detail.exclusive-theme .pd-features{background:#111;border:1px solid rgba(212,175,55,.15)}
#page-detail.exclusive-theme .pd-features h4{color:#d4af37}
#page-detail.exclusive-theme .pd-features li{color:#ccc}
#page-detail.exclusive-theme .pd-features li i{color:#d4af37}
#page-detail.exclusive-theme .pd-sizes label{color:#fff}
#page-detail.exclusive-theme .size-options button{background:#111;color:#fff;border-color:rgba(212,175,55,.3)}
#page-detail.exclusive-theme .size-options button:hover,#page-detail.exclusive-theme .size-options button.active{background:#d4af37;color:#000;border-color:#d4af37}
#page-detail.exclusive-theme .pd-actions .btn-add{background:linear-gradient(135deg,#d4af37,#b8960c);color:#000;font-weight:700;border:none}
#page-detail.exclusive-theme .pd-actions .btn-add:hover{background:linear-gradient(135deg,#e6c44a,#d4af37);transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,175,55,.3)}
#page-detail.exclusive-theme .pd-actions .btn-fav{border-color:rgba(212,175,55,.3);background:#111;color:#d4af37}
#page-detail.exclusive-theme .pd-shipping{border-color:rgba(212,175,55,.15);color:#aaa}
#page-detail.exclusive-theme .pd-shipping i{color:#d4af37}
#page-detail.exclusive-theme .pd-share span{color:#888}
#page-detail.exclusive-theme .pd-share button{border-color:rgba(212,175,55,.2);background:#111;color:#d4af37}
#page-detail.exclusive-theme .pd-fabric{border-color:rgba(212,175,55,.15)}
#page-detail.exclusive-theme .pd-fabric h4{color:#d4af37}
#page-detail.exclusive-theme .pd-fabric-desc{color:#aaa}
#page-detail.exclusive-theme .pd-related h3{color:#fff}
#page-detail.exclusive-theme::before{content:'';position:absolute;top:0;left:0;right:0;height:300px;background:linear-gradient(180deg,rgba(212,175,55,.06) 0%,transparent 100%);pointer-events:none;z-index:0}
#page-detail.exclusive-theme .product-detail{position:relative;z-index:1}

/* EXCLUSIVE STARS CANVAS */
#exclusiveStarsCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0;transition:opacity 1.5s ease}
#exclusiveStarsCanvas.active{opacity:1}
.exclusives-page{position:relative;overflow:hidden;min-height:100vh;background:#000}

/* FASTER TRANSITIONS */
:root{--transition:all .2s cubic-bezier(.25,.8,.25,1)}
.reveal{transition:opacity .4s cubic-bezier(.25,.8,.25,1),transform .4s cubic-bezier(.25,.8,.25,1)}
.reveal-left{transition:opacity .4s cubic-bezier(.25,.8,.25,1),transform .4s cubic-bezier(.25,.8,.25,1)}
.reveal-scale{transition:opacity .35s cubic-bezier(.25,.8,.25,1),transform .35s cubic-bezier(.25,.8,.25,1)}

/* ELEVATION SYSTEM */
.p-card,.collection-card,.exclusive-card,.fav-card{background:rgba(255,255,255,.04)!important;border:1px solid rgba(255,255,255,.06)!important;transition:all .4s cubic-bezier(.2,.9,.3,1)}
.p-card:hover,.collection-card:hover,.exclusive-card:hover,.fav-card:hover{background:rgba(255,255,255,.08)!important;border-color:rgba(255,255,255,.1)!important}

/* HERO TEXT REVEAL */
.hero-word{display:inline-block;overflow:hidden}
.hero-word .word-inner{display:inline-block;transform:none;opacity:1}
.hero-word.visible .word-inner{transform:none;opacity:1}

/* SCROLL REVEAL ENHANCED */
.reveal-up{opacity:1;transform:none;filter:none}
.reveal-up.visible{opacity:1;transform:none;filter:none}
.reveal-scale{opacity:1;transform:none}
.reveal-scale.visible{opacity:1;transform:none}

/* QUICK VIEW MODAL */
.quick-view-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease}
.quick-view-overlay.active{opacity:1;pointer-events:all}
.quick-view-box{background:#111;border:1px solid rgba(255,255,255,.08);max-width:700px;width:90%;max-height:85vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:0;animation:qvIn .3s cubic-bezier(.16,1,.3,1)}
@keyframes qvIn{from{transform:scale(.9) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.quick-view-img{aspect-ratio:3/4;overflow:hidden}
.quick-view-img img{width:100%;height:100%;object-fit:cover}
.quick-view-info{padding:32px;display:flex;flex-direction:column;justify-content:center;gap:12px}
.quick-view-info h3{font-size:1.2rem;font-weight:700;color:#fff}
.quick-view-info .qv-price{font-size:1.4rem;font-weight:800;color:#fff}
.quick-view-info .qv-sizes{display:flex;gap:6px;flex-wrap:wrap}
.quick-view-info .qv-sizes button{padding:8px 16px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.quick-view-info .qv-sizes button:hover,.quick-view-info .qv-sizes button.active{background:#fff;color:#000;border-color:#fff}
.quick-view-info .qv-add{padding:14px;background:#fff;color:#000;border:none;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s}
.quick-view-info .qv-add:hover{background:#d4af37;color:#000}
.quick-view-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;z-index:2}
@media(max-width:768px){.quick-view-box{grid-template-columns:1fr;max-height:90vh}.quick-view-img{aspect-ratio:1/1}}

/* SIZE GUIDE MODAL */
.size-guide-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.size-guide-overlay.active{opacity:1;pointer-events:all}
.size-guide-box{background:#111;border:1px solid rgba(255,255,255,.08);padding:40px;max-width:500px;width:90%;border-radius:4px}
.size-guide-box h3{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:20px}
.size-guide-table{width:100%;border-collapse:collapse;font-size:12px}
.size-guide-table th{text-align:left;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.08em;font-size:10px}
.size-guide-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);color:#fff}
.size-guide-table tr:hover td{background:rgba(255,255,255,.03)}

/* STICKY CART BAR (MOBILE) */
.sticky-cart-bar{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid rgba(255,255,255,.1);padding:12px 16px;display:none;align-items:center;justify-content:space-between;gap:12px;z-index:8000;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.8,.25,1)}
.sticky-cart-bar.visible{transform:translateY(0)}
.sticky-cart-bar .scb-price{font-size:1.1rem;font-weight:800;color:#fff}
.sticky-cart-bar .scb-btn{padding:12px 24px;background:#fff;color:#000;border:none;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer}
@media(max-width:768px){.sticky-cart-bar{display:flex}}

/* STORIES (MOBILE) */
.stories-bar{display:none;padding:16px;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stories-bar::-webkit-scrollbar{display:none}
@media(max-width:768px){.stories-bar{display:flex}}
.story-circle{flex-shrink:0;width:64px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.story-circle img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #d4af37;padding:2px}
.story-circle span{font-size:9px;color:rgba(255,255,255,.6);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.stories-overlay{position:fixed;inset:0;background:#000;z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.stories-overlay.active{opacity:1;pointer-events:all}
.stories-overlay img{max-width:100%;max-height:80vh;object-fit:contain}
.stories-overlay .story-progress{position:absolute;top:12px;left:12px;right:12px;display:flex;gap:4px}
.stories-overlay .story-progress-bar{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.stories-overlay .story-progress-bar .fill{height:100%;background:#d4af37;transition:width .1s linear}
.stories-overlay .story-info{position:absolute;bottom:60px;left:20px;right:20px;color:#fff}
.stories-overlay .story-info h4{font-size:1rem;font-weight:700;margin-bottom:4px}
.stories-overlay .story-info span{font-size:.85rem;color:#d4af37;font-weight:700}
.stories-overlay .story-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:#fff;font-size:24px;cursor:pointer;z-index:2}
.stories-overlay .story-nav{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr}
.stories-overlay .story-nav div{cursor:pointer}

/* NOTIFY ME */
.notify-me-form{display:flex;gap:8px;margin-top:12px}
.notify-me-form input{flex:1;padding:10px 14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:12px;border-radius:0}
.notify-me-form button{padding:10px 18px;background:#d4af37;color:#000;border:none;font-size:11px;font-weight:700;cursor:pointer}

/* VIEWING INDICATOR */
.viewing-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.6);margin-top:8px}
.viewing-indicator i{color:#d4af37;animation:viewPulse 2s ease-in-out infinite}
@keyframes viewPulse{0%,100%{opacity:.6}50%{opacity:1}}

/* WAITLIST */
.waitlist-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:#d4af37;font-size:11px;font-weight:600;margin-top:8px}

/* ORDER CONFIRMATION OVERLAY */
.order-confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .5s;will-change:opacity}
.order-confirm-overlay.active{opacity:1;pointer-events:all}
.order-confirm-overlay .oc-icon{width:64px;height:64px;border-radius:50%;background:rgba(212,175,55,.1);border:2px solid rgba(212,175,55,.3);display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.order-confirm-overlay .oc-icon i{font-size:24px;color:#d4af37}
.order-confirm-overlay h2{font-size:clamp(1.3rem,4vw,2.2rem);font-weight:800;color:#f5f5f5;margin-bottom:8px;letter-spacing:-0.02em}
.order-confirm-overlay p{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:6px}
.order-confirm-overlay .oc-order-id{font-family:'SF Mono',Monaco,monospace;color:#d4af37;font-size:11px;margin-top:20px;padding:10px 20px;background:rgba(212,175,55,.05);border:1px solid rgba(212,175,55,.15);border-radius:2px;letter-spacing:.05em}
.order-confirm-overlay .oc-total{font-size:1.4rem;font-weight:800;color:#f5f5f5;margin-top:12px}
.order-confirm-overlay .oc-method{font-size:11px;color:#777;margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.order-confirm-overlay .oc-btn{margin-top:36px;padding:14px 36px;background:#d4af37;border:none;color:#000;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;transition:all .3s;border-radius:2px}
.order-confirm-overlay .oc-btn:hover{background:#e8c547;transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,175,55,.3)}
@keyframes confettiDrop{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.confetti-particle{position:absolute;width:6px;height:6px;will-change:transform;animation:confettiDrop 2.5s ease-in forwards}

/* FOR YOU SECTION */
.for-you-section{padding:60px clamp(1.5rem,4vw,4rem);max-width:1400px;margin:0 auto}
.for-you-section h3{font-size:1.2rem;font-weight:700;color:var(--text-primary);margin-bottom:24px;letter-spacing:-0.02em}
.for-you-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:768px){.for-you-grid{grid-template-columns:1fr 1fr;gap:8px}}

/* COOKIE BANNER */
.cookie-banner{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid rgba(255,255,255,.08);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;z-index:9999;transform:translateY(100%);transition:transform .4s cubic-bezier(.25,.8,.25,1)}
.cookie-banner.visible{transform:translateY(0)}
.cookie-banner p{font-size:12px;color:#b0b0b0;flex:1}
.cookie-banner p a{color:#d4af37;text-decoration:underline}
.cookie-banner button{padding:10px 20px;background:#fff;color:#000;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.cookie-banner button:hover{background:#d4af37}

/* LEGAL PAGES */
.legal-page{max-width:800px;margin:0 auto;padding:80px clamp(1.5rem,4vw,4rem) 60px}
.legal-page h1{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:800;color:#f5f5f5;margin-bottom:8px;letter-spacing:-0.02em}
.legal-page .legal-updated{font-size:11px;color:#777;margin-bottom:40px}
.legal-page h2{font-size:1rem;font-weight:700;color:#f5f5f5;margin:32px 0 12px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06)}
.legal-page p,.legal-page li{font-size:13px;color:#b0b0b0;line-height:1.8;margin-bottom:12px}
.legal-page ul{padding-left:20px}
.legal-page a{color:#d4af37}

/* CHECKOUT PAYMENT MODAL */
.checkout-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;will-change:opacity}
.checkout-overlay.active{opacity:1;pointer-events:all}
.checkout-box{background:linear-gradient(145deg,#111 0%,#0d0d0d 100%);border:1px solid rgba(255,255,255,.1);border-radius:2px;max-width:480px;width:90%;max-height:85vh;overflow-y:auto;padding:36px 32px;position:relative;box-shadow:0 32px 64px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04)}
.checkout-box h2{font-size:1.1rem;font-weight:700;color:#f5f5f5;margin-bottom:2px;letter-spacing:-.01em}
.checkout-box .checkout-sub{font-size:11px;color:#777;margin-bottom:16px}
.checkout-box .checkout-total{font-size:1.6rem;font-weight:800;color:#d4af37;margin-bottom:6px;letter-spacing:-.02em}
.checkout-box .checkout-items-count{font-size:11px;color:#999;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.06)}
.checkout-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.05);border:none;color:#999;font-size:14px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:all .2s}
.checkout-close:hover{background:rgba(255,255,255,.1);color:#fff}
.payment-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.payment-tab{flex:1;padding:14px 12px;text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;background:transparent;color:#666;border:none;transition:all .2s;position:relative}
.payment-tab.active{background:rgba(212,175,55,.08);color:#d4af37}
.payment-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#d4af37}
.payment-content{min-height:200px}
.checkout-secure{display:flex;align-items:center;gap:6px;font-size:10px;color:#555;margin-top:16px;justify-content:center}
.checkout-secure i{color:#d4af37;font-size:9px}
.pix-content{text-align:center;padding:20px 0}
.pix-qr{width:160px;height:160px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:2px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:56px;color:#d4af37}
.pix-code{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:2px;padding:12px;font-family:'SF Mono',Monaco,monospace;font-size:9px;color:#b0b0b0;word-break:break-all;margin:12px 0;cursor:pointer;transition:border-color .2s}
.pix-code:hover{border-color:rgba(212,175,55,.3)}
.pix-timer{font-size:11px;color:#777;margin-top:12px}
.card-form{display:flex;flex-direction:column;gap:12px}
.card-form input{padding:13px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:#f5f5f5;font-size:13px;transition:border-color .2s}
.card-form input:focus{outline:none;border-color:rgba(212,175,55,.4)}
.card-form input::placeholder{color:#555}
.card-form .card-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.boleto-content{text-align:center;padding:20px 0}
.boleto-barcode{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:2px;padding:16px;font-family:'SF Mono',Monaco,monospace;font-size:10px;color:#b0b0b0;margin:16px 0;word-break:break-all}
.checkout-confirm-btn{width:100%;padding:16px;background:#d4af37;color:#000;border:none;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;cursor:pointer;margin-top:20px;transition:all .2s;border-radius:2px}
.checkout-confirm-btn:hover{background:#e8c547;transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,175,55,.3)}
.checkout-confirm-btn:active{transform:translateY(0)}
.checkout-confirm-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* FRETE CALCULATOR */
.frete-calc{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)}
.frete-calc label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#999;display:block;margin-bottom:8px}
.frete-calc .frete-input{display:flex;gap:8px}
.frete-calc input{flex:1;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#f5f5f5;font-size:12px}
.frete-calc button{padding:10px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#f5f5f5;font-size:11px;font-weight:600;cursor:pointer}
.frete-result{margin-top:10px;font-size:12px;color:#b0b0b0;padding:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.frete-result .frete-free{color:#d4af37;font-weight:700}

/* STOCK INDICATOR */
.stock-indicator{font-size:11px;color:#999;margin-top:8px;display:flex;align-items:center;gap:6px}
.stock-indicator.low{color:#CF6679}
.stock-indicator i{font-size:8px}

/* REVIEWS */
.reviews-section{margin-top:40px;padding-top:32px;border-top:1px solid rgba(255,255,255,.06)}
.reviews-section h3{font-size:14px;font-weight:700;color:#f5f5f5;margin-bottom:20px}
.review-card{padding:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);margin-bottom:12px}
.review-card .review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.review-card .review-author{font-size:12px;font-weight:600;color:#f5f5f5}
.review-card .review-date{font-size:10px;color:#777}
.review-card .review-stars{color:#d4af37;font-size:12px;margin-bottom:8px}

const S={
    page:'home',
    cart:safeParse('kz_cart',[]),

    orders:safeParse('kz_orders',[]),

    theme:{mode:'dark'},

    backgrounds:safeParse('kz_backgrounds',null)||{home:{animated:true,color:'#000000'},exclusives:{animated:true,color:'#000000'},products:{animated:false,color:'#ffffff'},cart:{animated:true,color:'#000000'}},
    notifications:safeParse('kz_notifications',[]),

    storeEmail:localStorage.getItem('kz_storeEmail')||''
};

let adminDirty=false;
let saveTimeout=null;
// Remove categoria Infantil e atualiza produtos com dados de tecido
(function cleanupAndUpdate(){S.categories=S.categories.filter(c=>c!=='Infantil');S.products=S.products.filter(p=>p.cat!=='Infantil');S.products.forEach(p=>{const def=defaultProducts.find(d=>d.id===p.id||d.name===p.name);if(def&&def.fabricName){p.fabricName=def.fabricName;p.fabricWeight=def.fabricWeight;p.fabricDesc=def.fabricDesc;p.fabricImages=def.fabricImages;}else if(!p.fabricName){p.fabricName='Algodão Premium';p.fabricWeight='180g/m²';p.fabricDesc='Tecido de alta qualidade com toque macio e durabilidade superior.';p.fabricImages=['https://images.unsplash.com/photo-1558171813-4c088753af8f?w=200&h=200&fit=crop','https://images.unsplash.com/photo-1528459105426-b9548367069b?w=200&h=200&fit=crop'];}});save();})();
function save(){localStorage.setItem('kz_cart',JSON.stringify(S.cart));localStorage.setItem('kz_favs',JSON.stringify(S.favs));localStorage.setItem('kz_user',JSON.stringify(S.user));localStorage.setItem('kz_texts',JSON.stringify(S.texts));localStorage.setItem('kz_products',JSON.stringify(S.products));localStorage.setItem('kz_cats',JSON.stringify(S.categories));localStorage.setItem('kz_promo',JSON.stringify(S.promo));localStorage.setItem('kz_featured',JSON.stringify(S.featured));localStorage.setItem('kz_new',JSON.stringify(S.newCollection));localStorage.setItem('kz_limited',JSON.stringify(S.limited));localStorage.setItem('kz_drops',JSON.stringify(S.drops));localStorage.setItem('kz_orders',JSON.stringify(S.orders));localStorage.setItem('kz_leads',JSON.stringify(S.leads));localStorage.setItem('kz_theme',JSON.stringify(S.theme));localStorage.setItem('kz_homeImages',JSON.stringify(S.homeImages));localStorage.setItem('kz_leadUser',JSON.stringify(S.leadUser));localStorage.setItem('kz_exclusives',JSON.stringify(S.exclusives));localStorage.setItem('kz_backgrounds',JSON.stringify(S.backgrounds));localStorage.setItem('kz_notifications',JSON.stringify(S.notifications));localStorage.setItem('kz_reviews',JSON.stringify(S.reviews));localStorage.setItem('kz_storeEmail',S.storeEmail||'');}
function adminSave(){save();saveToFirestore();adminDirty=false;updateSaveBtn();updateSaveStatus('saved');toast('Alterações salvas e publicadas!');}
function markDirty(){adminDirty=true;updateSaveBtn();updateSaveStatus('saving');clearTimeout(saveTimeout);saveTimeout=setTimeout(()=>{save();saveToFirestore();adminDirty=false;updateSaveBtn();},1500);}
function updateSaveBtn(){const btn=document.getElementById('adminSaveBtn');if(btn){btn.style.display=adminDirty?'flex':'none';}}
function updateSaveStatus(status){const el=document.getElementById('adminSaveStatus');if(!el)return;if(status==='saving'){el.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Salvando...';el.className='save-status saving';}else if(status==='saved'){el.innerHTML='<i class="fas fa-check-circle"></i> Salvo';el.className='save-status saved';setTimeout(()=>{if(el.className.includes('saved'))el.innerHTML='<i class="fas fa-cloud"></i> Sincronizado';},3000);}else if(status==='error'){el.innerHTML='<i class="fas fa-exclamation-circle"></i> Erro ao salvar';el.className='save-status error';}}
function toast(m,t='success'){const c=document.getElementById('toasts');const el=document.createElement('div');el.className='toast '+t;el.innerHTML='<i class="fas fa-'+(t==='success'?'check':'exclamation-triangle')+'"></i>'+m;c.appendChild(el);setTimeout(()=>el.classList.add('show'),10);setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300)},3000);}
function T(k){return S.texts[k]||defaultTexts[k]||'';}
function getCats(){return S.categories;}
function syncAll(){S.cart=S.cart.filter(i=>S.products.some(p=>p.id===i.id));S.cart.forEach(i=>{const p=S.products.find(x=>x.id===i.id);if(p){i.name=p.name;i.price=p.price;i.img=p.img;}});S.favs=S.favs.filter(i=>S.products.some(p=>p.id===i.id));S.favs=S.favs.map(f=>{const p=S.products.find(x=>x.id===f.id);return p?{...p}:f;});save();updateBadges();}

// ========== CART ==========
function addCart(id,size){const p=S.products.find(x=>x.id===id);if(!p)return;if(p.soldOut){toast('Produto esgotado','error');return;}if(typeof p.stock==='number'){const inCart=S.cart.filter(x=>x.id===id).reduce((s,x)=>s+x.qty,0);if(inCart>=p.stock){toast('Estoque insuficiente','error');return;}}haptic(10);const ex=S.cart.find(x=>x.id===id&&x.size===(size||''));if(ex)ex.qty++;else S.cart.push({...p,qty:1,size:size||''});save();updateBadges();toast('Adicionado ao carrinho');trackEvent('add_to_cart',{item_id:id,item_name:p.name,price:p.price});if(S.page==='cart')renderCartPage();if(S.page==='detail')renderDetail();}
function removeCart(id,size,colorName){S.cart=S.cart.filter(x=>!(x.id===id&&x.size===size&&(x.colorName||'')===colorName));save();updateBadges();renderCartPage();}
function updateQty(id,size,d,colorName){const i=S.cart.find(x=>x.id===id&&x.size===size&&(x.colorName||'')===(colorName||''));if(i){i.qty=Math.max(1,i.qty+d);save();updateBadges();renderCartPage();}}
function cartTotal(){return S.cart.reduce((t,i)=>t+i.price*i.qty,0);}
function cartCount(){return S.cart.reduce((t,i)=>t+i.qty,0);}

// ========== FAVS ==========
function toggleFav(id){haptic(10);const idx=S.favs.findIndex(x=>x.id===id);if(idx>-1){S.favs.splice(idx,1);toast('Removido dos favoritos');}else{const p=S.products.find(x=>x.id===id);if(p){S.favs.push({...p});toast('Adicionado aos favoritos');}}save();updateBadges();renderCurrentPage();}
function isFav(id){return S.favs.some(x=>x.id===id);}

// ========== NAV ==========
function pageFlash(color,callback){callback();}
function goTo(page){const prev=S.page;const changed=prev!==page;if(!changed)return;S.page=page;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));const el=document.getElementById('page-'+page);if(el)el.classList.add('active');document.querySelectorAll('nav a').forEach(a=>a.classList.toggle('active',a.dataset.page===page));const detailEl=document.getElementById('page-detail');if(detailEl){if(page==='detail'&&S.detailFrom==='exclusives'){detailEl.classList.add('exclusive-theme');}else{detailEl.classList.remove('exclusive-theme');}}if(page==='exclusives'&&S.backgrounds.exclusives.animated){setTimeout(initExclusiveStars,100);}else{stopExclusiveStars();}if(page==='home'){toggleStars(true);}else{toggleStars(false);}applyPageBackground(page);renderCurrentPage();window.scrollTo(0,0);trackEvent('page_view',{page_title:page});}
function applyPageBackground(page){const homeEl=document.getElementById('page-home');const prodEl=document.getElementById('page-products');const exEl=document.getElementById('page-exclusives');const cartEl=document.getElementById('page-cart');if(homeEl)homeEl.style.background='transparent';if(prodEl)prodEl.style.background='#0a0a0a';if(exEl)exEl.style.background='#000000';if(cartEl)cartEl.style.background=S.backgrounds.cart.color;}
function renderCurrentPage(){if(S.page==='products')renderProductsGrid();if(S.page==='exclusives')renderExclusivesPage();if(S.page==='favs')renderFavsPage();if(S.page==='cart'){renderCartPage();if(S.backgrounds.cart.animated){initGalaxy();}else{stopGalaxy();}}else{stopGalaxy();}if(S.page==='profile')renderProfilePage();if(S.page==='admin')renderAdminPage();if(S.page==='detail')renderDetail();setTimeout(()=>{initBlurUpImages();if(S.page==='home')initStories();},200);}
function updateBadges(){const cb=document.getElementById('cartBadge');const fb=document.getElementById('favBadge');if(cb){cb.textContent=cartCount();cb.style.display=cartCount()>0?'flex':'none';}if(fb){fb.textContent=S.favs.length;fb.style.display=S.favs.length>0?'flex':'none';}}
function openDetail(id){S.detailProduct=id;S.detailFrom='products';selectedColorIdx=0;goTo('detail');}
function openExclusiveDetail(id){S.detailProduct=id;S.detailFrom='exclusives';selectedColorIdx=0;goTo('detail');}

// ========== RENDER PAGES ==========
function renderProductsGrid(filter='all'){
    const grid=document.getElementById('pGrid');const filtersEl=document.getElementById('pFilters');if(!grid)return;
    const scrollY=window.pageYOffset;
    const cats=getCats();
    if(filtersEl)filtersEl.innerHTML='<button class="cat-nav-btn '+(filter==='all'?'active':'')+'" onclick="renderProductsGrid(\'all\')">Todos</button>'+cats.map(c=>'<button class="cat-nav-btn '+(filter===c?'active':'')+'" onclick="renderProductsGrid(\''+c+'\')">'+c+'</button>').join('');
    function renderCard(p){const hasColors=p.colors&&p.colors.length>0;const displayPrice=hasColors?Math.min(...p.colors.map(c=>c.price)):p.price;const sizes=p.sizes||['P','M','G'];const installment=(displayPrice/3).toFixed(2);return '<div class="p-card'+(p.soldOut?' sold-out':'')+'" onclick="openDetail(\''+p.id+'\')" style="'+(p.soldOut?'opacity:.7':'')+'"><div class="p-card-img-wrap"><img src="'+p.img+'" alt="'+p.name+'" loading="lazy">'+(p.soldOut?'<div class="p-card-sold-badge">ESGOTADO</div>':'')+'<div class="p-card-actions"><button onclick="event.stopPropagation();toggleFav(\''+p.id+'\')" class="'+(isFav(p.id)?'fav-active':'')+'"><i class="fas fa-heart"></i></button><button onclick="event.stopPropagation();addCart(\''+p.id+'\')"><i class="fas fa-shopping-bag"></i></button></div><button class="p-card-quick" onclick="event.stopPropagation();openQuickView(\''+p.id+'\')">VER RÁPIDO</button></div><div class="p-card-info"><span class="p-card-cat">'+p.cat+'</span><h3 class="p-card-name">'+p.name+'</h3><div class="p-card-price-row"><span class="p-card-price">R$ '+displayPrice.toFixed(2)+'</span><span class="p-card-installment">3x R$ '+installment+'</span></div>'+(hasColors?'<div class="p-card-colors">'+p.colors.slice(0,8).map(c=>'<span class="color-dot-sm" style="background:'+c.hex+'" title="'+c.name+'"></span>').join('')+'</div>':'')+'<div class="p-card-sizes">'+sizes.slice(0,5).map(s=>'<span>'+s+'</span>').join('')+'</div></div></div>';}
    if(filter==='all'){grid.innerHTML=S.products.length?'<div class="p-grid">'+S.products.map(p=>renderCard(p)).join('')+'</div>':'<div class="empty-state"><i class="fas fa-box-open"></i><p>Nenhum produto</p></div>';}else{const items=S.products.filter(p=>p.cat===filter);grid.innerHTML=items.length?'<div class="cat-section"><div class="cat-section-header"><h3>'+filter+'</h3><span>'+items.length+' produto'+(items.length>1?'s':'')+'</span></div><div class="p-grid">'+items.map(p=>renderCard(p)).join('')+'</div></div>':'<div class="empty-state"><i class="fas fa-box-open"></i><p>Nenhum produto nesta categoria</p></div>';}
    requestAnimationFrame(()=>window.scrollTo(0,scrollY));
}

// ========== EXCLUSIVES PAGE ==========
function renderExclusivesPage(){
const c=document.getElementById('exclusivesContent');if(!c)return;
if(!S.exclusives.active||!S.exclusives.products.length){c.innerHTML='<div class="exclusives-header"><span class="exclusives-badge-top"><i class="fas fa-gem"></i> Edição Limitada</span><h2>'+S.exclusives.title+'</h2><p>'+S.exclusives.subtitle+'</p></div><div class="empty-state"><i class="fas fa-gem"></i><p>Nenhum produto exclusivo no momento</p></div>';return;}
const cards=S.exclusives.products.map(ex=>{
const p=S.products.find(x=>x.id===ex.productId);if(!p)return '';
const remaining=ex.stock-ex.sold;const pct=ex.stock>0?((ex.sold/ex.stock)*100):100;
const isSoldOut=remaining<=0;const isLast=remaining>0&&remaining<=3;
const fillClass=isSoldOut?'empty':remaining<=3?'low':remaining<=Math.ceil(ex.stock*0.3)?'medium':'high';
const badge=isSoldOut?'<div class="exclusive-badge sold-out"><i class="fas fa-times-circle"></i> ESGOTADO</div>':isLast?'<div class="exclusive-badge last-units"><i class="fas fa-fire"></i> ÚLTIMAS '+remaining+' UN.</div>':'<div class="exclusive-badge limited"><i class="fas fa-gem"></i> EXCLUSIVO</div>';
return '<div class="exclusive-card'+(isSoldOut?' is-sold-out':'')+'" onclick="'+(isSoldOut?'':'openExclusiveDetail(\''+p.id+'\')')+'"><div class="exclusive-card-img">'+badge+'<img src="'+p.img+'" alt="'+p.name+'"></div><div class="exclusive-card-info"><span class="exclusive-cat">'+p.cat+'</span><h3>'+p.name+'</h3><div class="exclusive-price">R$ '+p.price.toFixed(2)+'</div><div class="exclusive-stock"><div class="exclusive-stock-bar"><div class="exclusive-stock-fill '+fillClass+'" style="width:'+pct+'%"></div></div><div class="exclusive-stock-text"><span><strong>'+remaining+'</strong> de '+ex.stock+' restantes</span>'+(isLast?'<span style="color:#CF6679;font-weight:700">Corra!</span>':'')+'</div></div></div></div>';}).join('');
c.innerHTML='<div class="exclusives-header"><span class="exclusives-badge-top"><i class="fas fa-gem"></i> Edição Limitada</span><h2>'+S.exclusives.title+'</h2><p>'+S.exclusives.subtitle+'</p><div class="viewing-indicator" style="justify-content:center;margin-top:12px"><i class="fas fa-eye"></i> <span id="viewingCount">'+viewingCount+'</span> pessoas estão vendo agora</div></div><div class="exclusives-grid">'+cards+'</div>';
}

let selectedColorIdx=0;
function renderDetail(){
    const c=document.getElementById('detailContent');if(!c)return;
    const p=S.products.find(x=>x.id===S.detailProduct);
    if(!p){c.innerHTML='<div class="empty-state"><p>Produto não encontrado</p></div>';return;}
    const sizes=p.sizes||['P','M','G'];
    const disabled=p.disabledSizes||[];
    const hasColors=p.colors&&p.colors.length>0;
    const activeColor=hasColors?p.colors[selectedColorIdx]||p.colors[0]:null;
    const currentPrice=activeColor?activeColor.price:p.price;
    const productImages=p.images&&p.images.length?p.images:(p.img?[p.img]:[]);
    const currentImages=activeColor&&activeColor.images.length?activeColor.images:productImages;
    const mainImg=currentImages[0]||p.img;
    const installment=(currentPrice/3).toFixed(2);
    const isSoldOut=p.soldOut||(activeColor?activeColor.soldOut:false);
    const related=S.products.filter(x=>x.cat===p.cat&&x.id!==p.id).slice(0,4);
    c.innerHTML='<div class="product-detail"><div class="pd-gallery-wrapper">'+(currentImages.length>1?'<div class="pd-thumbs-side">'+currentImages.map((img,i)=>'<img class="pd-thumb '+(i===0?'active':'')+'" src="'+img+'" onclick="changeMainImg(\''+img+'\',this)">').join('')+'</div>':'')+'<div class="pd-gallery"><img id="pdMainImg" src="'+mainImg+'" alt="'+p.name+'">'+(S.promo.active&&S.promo.productIds.includes(p.id)?'<div class="pd-badge">-'+S.promo.discount+'% OFF</div>':'')+'<div class="pd-img-counter"><i class="fas fa-images"></i> '+currentImages.length+'</div></div></div><div class="pd-info"><div class="pd-cat">'+p.cat+'</div><h1>'+p.name+'</h1>'+(hasColors?'<div class="color-options" style="margin-bottom:12px">'+p.colors.map((col,i)=>'<div class="color-dot '+(i===selectedColorIdx?'active':'')+(col.soldOut?' sold-out':'')+'" style="background:'+col.hex+'" title="'+col.name+(col.soldOut?' (Esgotado)':'')+'" onclick="selectColor('+i+')"></div>').join('')+'</div>'+(activeColor?'<p style="font-size:11px;color:var(--gray3);margin-bottom:12px"><i class="fas fa-circle" style="color:'+activeColor.hex+';font-size:8px"></i> '+activeColor.name+'</p>':''):'')+(isSoldOut?'<div class="pd-sold-out-badge"><i class="fas fa-times-circle"></i> ESGOTADO</div>':'')+'<div class="pd-price">R$ '+currentPrice.toFixed(2)+'</div><div class="pd-installments">ou 3x de R$ '+installment+' sem juros</div>'+(typeof p.stock==='number'&&p.stock>0&&p.stock<10?'<div class="stock-indicator low"><i class="fas fa-circle"></i> Apenas '+p.stock+' em estoque</div>':'')+(S.detailFrom==='exclusives'?'<div class="viewing-indicator"><i class="fas fa-eye"></i> <span id="viewingCount">'+viewingCount+'</span> pessoas estão vendo agora</div>':'')+'<p class="pd-desc">'+p.desc+'</p><div class="pd-features"><h4>Detalhes do produto</h4><ul><li><i class="fas fa-check"></i> Algodão premium de alta gramatura</li><li><i class="fas fa-check"></i> Costura reforçada</li><li><i class="fas fa-check"></i> Não encolhe após lavagem</li><li><i class="fas fa-check"></i> Estampa resistente</li></ul></div>'+(p.fabricName?'<div class="pd-fabric"><h4>Tecido & Material</h4><div class="pd-fabric-info"><span class="pd-fabric-name">'+p.fabricName+'</span>'+(p.fabricWeight?'<span class="pd-fabric-weight">'+p.fabricWeight+'</span>':'')+'</div>'+(p.fabricDesc?'<p class="pd-fabric-desc">'+p.fabricDesc+'</p>':'')+(p.fabricImages&&p.fabricImages.length?'<div class="pd-fabric-imgs">'+p.fabricImages.map(img=>'<img src="'+img+'" alt="Tecido">').join('')+'</div>':'')+'</div>':'')+'<div class="pd-sizes"><label>Tamanho <a onclick="openSizeGuide()" style="font-size:10px;color:#d4af37;cursor:pointer;margin-left:8px;text-decoration:underline">Guia de Tamanhos</a></label><div class="size-options">'+sizes.map((s,i)=>{const isDisabled=disabled.includes(s);return '<button class="'+(isDisabled?'disabled':(i===0?'active':''))+'" onclick="'+(isDisabled?'':'selectSize(this)')+'" '+(isDisabled?'disabled':'')+'>'+s+'</button>';}).join('')+'</div></div><div class="pd-actions"><button class="btn-add" onclick="addCartWithColor(\''+p.id+'\')" '+(isSoldOut?'disabled style="opacity:.4;cursor:not-allowed"':'')+'><i class="fas fa-shopping-bag"></i> '+(isSoldOut?'ESGOTADO':'ADICIONAR AO CARRINHO')+'</button><button class="btn-fav '+(isFav(p.id)?'active':'')+'" onclick="toggleFav(\''+p.id+'\')"><i class="fas fa-heart"></i></button></div>'+(isSoldOut?'<div class="notify-me-form"><input type="email" placeholder="Seu email para notificação..." id="notifyEmail"><button onclick="notifyMe(\''+p.id+'\')">AVISAR</button></div>':'')+'<div class="pd-shipping"><i class="fas fa-truck"></i> Frete grátis para compras acima de R$ 199</div><div class="pd-share"><span>Compartilhar</span><button onclick="shareProduct(\'whatsapp\')"><i class="fab fa-whatsapp"></i></button><button onclick="shareProduct(\'copy\')"><i class="fas fa-link"></i></button></div></div></div>'+(related.length?'<div class="pd-related"><h3>Você também pode gostar</h3><div class="pd-related-grid">'+related.map(r=>'<div class="p-card" onclick="openDetail(\''+r.id+'\')"><img src="'+r.img+'" alt="'+r.name+'" style="height:220px"><div class="p-card-overlay" style="opacity:1;transform:none;background:rgba(0,0,0,.7);backdrop-filter:blur(6px)"><h3>'+r.name+'</h3><span class="price">R$ '+r.price.toFixed(2)+'</span></div></div>').join('')+'</div></div>':'')+'<div class="reviews-section"><h3><i class="fas fa-star" style="color:#d4af37;margin-right:6px"></i>Avaliações'+(getReviews(p.id).length?' ('+getReviews(p.id).length+')':'')+'</h3>'+(getReviews(p.id).length?getReviews(p.id).map(r=>'<div class="review-card"><div class="review-header"><span class="review-author">'+r.author+'</span><span class="review-date">'+r.date+'</span></div><div class="review-stars">'+renderStars(r.rating)+'</div>'+(r.text?'<p class="review-text">'+r.text+'</p>':'')+'</div>').join(''):'<p style="font-size:12px;color:#777">Nenhuma avaliação ainda. Seja o primeiro!</p>')+'<div class="review-form"><h4>Deixe sua avaliação</h4><div class="star-select"><i class="fas fa-star" onclick="selectReviewStar(this,1)"></i><i class="fas fa-star" onclick="selectReviewStar(this,2)"></i><i class="fas fa-star" onclick="selectReviewStar(this,3)"></i><i class="fas fa-star" onclick="selectReviewStar(this,4)"></i><i class="fas fa-star" onclick="selectReviewStar(this,5)"></i></div><input type="text" id="reviewName" placeholder="Seu nome"><textarea id="reviewText" placeholder="Conte sua experiência (opcional)"></textarea><button onclick="submitReview(\''+p.id+'\')">ENVIAR AVALIAÇÃO</button></div></div>';
    if(!isSoldOut){const stickyBar=document.getElementById('stickyCartBar');if(stickyBar){stickyBar.innerHTML='<span class="scb-price">R$ '+currentPrice.toFixed(2)+'</span><button class="scb-btn" onclick="addCartWithColor(\''+p.id+'\')"><i class="fas fa-shopping-bag" style="margin-right:6px"></i>ADICIONAR</button>';setTimeout(initStickyCartBar,100);}}
    trackEvent('view_item',{item_id:p.id,item_name:p.name,price:currentPrice});
}
function selectColor(idx){selectedColorIdx=idx;renderDetail();}
function changeMainImg(src,thumb){document.getElementById('pdMainImg').src=src;document.querySelectorAll('.pd-thumb').forEach(t=>t.classList.remove('active'));if(thumb)thumb.classList.add('active');}
function addCartWithColor(id){const p=S.products.find(x=>x.id===id);if(!p)return;const hasColors=p.colors&&p.colors.length>0;const color=hasColors?p.colors[selectedColorIdx]:null;if(color&&color.soldOut){toast('Cor esgotada!','error');return;}const size=getSelectedSize();const price=color?color.price:p.price;const colorName=color?color.name:'';const ex=S.cart.find(x=>x.id===id&&x.size===size&&x.colorName===colorName);if(ex)ex.qty++;else S.cart.push({id:p.id,name:p.name,img:color&&color.images.length?color.images[0]:p.img,price,qty:1,size,colorName,colorHex:color?color.hex:''});save();updateBadges();toast('Adicionado ao carrinho');if(S.page==='detail')renderDetail();}
function selectSize(btn){if(btn.classList.contains('disabled'))return;btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function getSelectedSize(){const el=document.querySelector('.size-options button.active');return el?el.textContent:'';}
function shareProduct(type){const p=S.products.find(x=>x.id===S.detailProduct);if(!p)return;const text='Confira: '+p.name+' por R$ '+p.price.toFixed(2)+' na KAZIN!';if(type==='whatsapp'){window.open('https://wa.me/?text='+encodeURIComponent(text));}else{navigator.clipboard.writeText(text).then(()=>toast('Link copiado!'));}}

function renderFavsPage(){const c=document.getElementById('favsContent');if(!c)return;if(S.favs.length===0){c.innerHTML='<div class="empty-state"><i class="fas fa-heart"></i><p>Nenhum favorito</p></div>';return;}c.innerHTML=S.favs.map(p=>'<div class="fav-card"><img src="'+p.img+'" alt="'+p.name+'"><div class="fav-card-info"><h4>'+p.name+'</h4><span class="price">R$ '+p.price.toFixed(2)+'</span></div><div class="fav-card-actions"><button class="btn-black" onclick="addCart(\''+p.id+'\')"><i class="fas fa-cart-plus"></i> Adicionar</button><button class="btn-d" onclick="toggleFav(\''+p.id+'\')"><i class="fas fa-trash"></i></button></div></div>').join('');}

function renderCartPage(){const c=document.getElementById('cartContent');if(!c)return;if(S.cart.length===0){c.innerHTML='<div class="empty-state"><i class="fas fa-shopping-bag"></i><p>Carrinho vazio</p></div>';return;}const itemsHtml=S.cart.map(i=>'<div class="cart-card"><button class="cart-card-remove" onclick="removeCart(\''+i.id+'\',\''+i.size+'\',\''+(i.colorName||'')+'\')"><i class="fas fa-times"></i></button><img src="'+i.img+'" alt="'+i.name+'"><div class="cart-card-body"><h4>'+i.name+'</h4><p class="cart-card-meta">'+(i.colorName?'<span class="color-dot-sm" style="background:'+(i.colorHex||'#000')+'"></span> '+i.colorName:'')+(i.size?(i.colorName?' — ':'')+i.size:'')+'</p><div class="cart-card-price">R$ '+i.price.toFixed(2)+'</div><div class="cart-card-qty"><button onclick="updateQty(\''+i.id+'\',\''+i.size+'\',-1,\''+(i.colorName||'')+'\')">−</button><span>'+i.qty+'</span><button onclick="updateQty(\''+i.id+'\',\''+i.size+'\',1,\''+(i.colorName||'')+'\')">+</button></div></div></div>').join('');const subtotal=cartTotal();const lead=S.leads[getLeadId()]||{};const frete=lead.cep?calcFrete(lead.cep):null;const freteVal=frete?frete.value:(subtotal>=199?0:19.90);const freteLabel=freteVal===0?'Grátis':'R$ '+freteVal.toFixed(2);const grandTotal=subtotal+freteVal;const sidebarHtml='<h3>Resumo</h3><div class="cart-sidebar-row"><span>Itens ('+S.cart.reduce((t,i)=>t+i.qty,0)+')</span><span>R$ '+subtotal.toFixed(2)+'</span></div><div class="cart-sidebar-row"><span>Frete</span><span>'+freteLabel+'</span></div><div class="cart-sidebar-total"><span>Total</span><span>R$ '+grandTotal.toFixed(2)+'</span></div><button onclick="startCheckout()">FINALIZAR COMPRA</button><div class="frete-calc"><label><i class="fas fa-truck" style="margin-right:4px"></i> Calcular Frete</label><div class="frete-input"><input type="text" placeholder="Digite seu CEP" maxlength="9" value="'+(lead.cep||'')+'" oninput="this.value=this.value.replace(/[^0-9]/g,String()).substring(0,8)" onblur="onCepInput(this)"><button onclick="onCepInput(this.previousElementSibling)">OK</button></div><div class="frete-result" id="freteResult" style="display:'+(frete?'block':'none')+'">'+(frete?(freteVal===0?'<span class="frete-free"><i class="fas fa-truck"></i> Frete Grátis!</span> ('+frete.days+')':'<i class="fas fa-truck"></i> '+frete.label+' — '+frete.days):'')+'</div></div>';c.innerHTML='<div class="cart-grid"><div class="cart-items">'+itemsHtml+'</div><div class="cart-sidebar">'+sidebarHtml+'</div></div>';}

function renderProfilePage(){
    const c=document.getElementById('profileContent');if(!c)return;
    const lead=S.leads[getLeadId()]||{};
    const isLogged=S.leadUser&&S.leadUser.uid;
    c.innerHTML=`<div class="profile-card"><div class="profile-header"><div class="profile-avatar-img">${isLogged&&S.leadUser.photo?'<img src="'+S.leadUser.photo+'" alt="">':'<i class="fas fa-user"></i>'}</div><div class="profile-header-info"><div class="profile-name">${isLogged?S.leadUser.name:lead.name||'Visitante'}</div><div class="profile-email">${isLogged?S.leadUser.email:lead.email||'Complete seu perfil'}</div></div>${isLogged?'<button class="profile-logout" onclick="leadLogout()"><i class="fas fa-sign-out-alt"></i> Sair</button>':'<button class="profile-logout" onclick="leadGoogleLogin()" style="background:#000;color:#fff"><i class="fab fa-google"></i> Entrar</button>'}</div>
    <div class="profile-stats"><div class="profile-stat"><span>${S.favs.length}</span><p>Favoritos</p></div><div class="profile-stat"><span>${S.cart.length}</span><p>No Carrinho</p></div><div class="profile-stat"><span>${S.orders.filter(o=>o.leadId===getLeadId()).length}</span><p>Pedidos</p></div></div>
    <div class="profile-tabs"><button class="ptab active" onclick="showPTab('dados',this)">Meus Dados</button><button class="ptab" onclick="showPTab('pedidos',this)">Meus Pedidos</button></div>
    <div id="pTabContent"></div></div>`;
    showPTab('dados',document.querySelector('.ptab'));
}
function showPTab(tab,btn){document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const c=document.getElementById('pTabContent');const lead=S.leads[getLeadId()]||{};
if(tab==='dados')c.innerHTML='<p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#777;margin-bottom:12px">Dados Pessoais</p><div class="form-group"><label>Nome completo</label><input id="lName" value="'+(lead.name||'')+'"></div><div class="form-row"><div class="form-group"><label>Email</label><input id="lEmail" type="email" value="'+(lead.email||'')+'"></div><div class="form-group"><label>Telefone</label><input id="lPhone" value="'+(lead.phone||'')+'"></div></div><p style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#777;margin:20px 0 12px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)">Endereço de Entrega</p><div class="form-row"><div class="form-group"><label>CEP</label><input id="lCep" value="'+(lead.cep||'')+'" maxlength="8" oninput="this.value=this.value.replace(/[^0-9]/g,String())" onblur="onCepInput(this)"></div><div class="form-group"><label>Rua</label><input id="lRua" value="'+(lead.rua||'')+'"></div></div><div class="form-row"><div class="form-group"><label>Número</label><input id="lNum" value="'+(lead.num||'')+'"></div><div class="form-group"><label>Bairro</label><input id="lBairro" value="'+(lead.bairro||'')+'"></div></div><div class="form-row"><div class="form-group"><label>Cidade</label><input id="lCidade" value="'+(lead.cidade||'')+'"></div><div class="form-group"><label>Estado</label><input id="lEstado" value="'+(lead.estado||'')+'"></div></div><button class="btn-black" onclick="saveAllProfile()" style="margin-top:16px"><i class="fas fa-check" style="margin-right:6px"></i>SALVAR</button>';
else{const myOrders=S.orders.filter(o=>o.leadId===getLeadId());c.innerHTML=myOrders.length?myOrders.map(o=>'<div class="order-row"><div class="o-info"><h4>Pedido #'+o.id.slice(-6)+'</h4><p>'+o.date+' — '+o.items.length+' item(s) — <span style="color:#d4af37">'+o.status+'</span></p></div><div class="o-total">R$ '+o.total.toFixed(2)+'</div></div>').join(''):'<div class="empty-state"><i class="fas fa-box"></i><p>Nenhum pedido</p></div>';}}

function getLeadId(){return S.leadUser&&S.leadUser.uid?S.leadUser.uid:(localStorage.getItem('kz_leadId')||(()=>{const id='lead_'+Date.now();localStorage.setItem('kz_leadId',id);return id;})());}

let countdownInterval;
function startCountdown(){if(countdownInterval)clearInterval(countdownInterval);countdownInterval=setInterval(()=>{const el=document.getElementById('countdown');if(!el||!S.promo.active||!S.promo.endDate)return;const end=new Date(S.promo.endDate).getTime();const now=Date.now();const diff=end-now;if(diff<=0){el.innerHTML='<div class="countdown-item"><span class="num">0</span><span class="lbl">Encerrado</span></div>';clearInterval(countdownInterval);return;}const d=Math.floor(diff/86400000);const h=Math.floor((diff%86400000)/3600000);const m=Math.floor((diff%3600000)/60000);const s=Math.floor((diff%60000)/1000);el.innerHTML='<div class="countdown-item"><span class="num">'+d+'</span><span class="lbl">Dias</span></div><div class="countdown-item"><span class="num">'+h+'</span><span class="lbl">Horas</span></div><div class="countdown-item"><span class="num">'+m+'</span><span class="lbl">Min</span></div><div class="countdown-item"><span class="num">'+s+'</span><span class="lbl">Seg</span></div>';},1000);}

function toggleVitrine(section,id){const s=S[section];const idx=s.productIds.indexOf(id);if(idx>-1)s.productIds.splice(idx,1);else s.productIds.push(id);save();markDirty();showATab('vitrines',document.querySelector('.atab.active'));}
function toggleVitrinePanel(panelId){const panel=document.getElementById(panelId);const arrow=document.getElementById(panelId+'-arrow');if(!panel)return;const isOpen=panel.style.display!=='none';panel.style.display=isOpen?'none':'block';if(arrow)arrow.style.transform=isOpen?'rotate(0deg)':'rotate(180deg)';}
function manageSizes(id){const p=S.products.find(x=>x.id===id);if(!p)return;const allSizes=p.sizes||[];const disabled=p.disabledSizes||[];const presetSizes=['PP','P','M','G','GG','XG','XXG','2','4','6','8','10','12','36','38','40','42','44','46'];const availableToAdd=presetSizes.filter(s=>!allSizes.includes(s));const html='<div class="modal-box"><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button><div class="size-modal-header"><img src="'+p.img+'" alt="'+p.name+'"><h2>'+p.name+'</h2></div><p class="size-modal-subtitle">Clique nos tamanhos para alternar entre disponível e esgotado</p><div class="size-legend"><span><span class="dot green"></span> Disponível</span><span><span class="dot red"></span> Esgotado</span></div><div class="size-modal-grid">'+allSizes.map(s=>{const isDisabled=disabled.includes(s);return '<button class="size-btn '+(isDisabled?'unavailable':'available')+'" onclick="toggleSizeAvail(\''+id+'\',\''+s+'\')"><span>'+s+'</span><i class="fas fa-'+(isDisabled?'times':'check')+'"></i></button>';}).join('')+'</div><div class="size-add-section"><label>Adicionar tamanho</label><div class="size-modal-grid" style="margin-bottom:12px">'+availableToAdd.map(s=>'<button class="size-btn" style="border-color:#ddd;color:#666;height:50px" onclick="addSizeToProduct(\''+id+'\',\''+s+'\')"><span>'+s+'</span><i class="fas fa-plus" style="font-size:9px;color:#999"></i></button>').join('')+'</div><div class="size-add-row"><input id="newSizeInput" placeholder="Tamanho personalizado"><button onclick="addSizeToProduct(\''+id+'\')"><i class="fas fa-plus"></i> ADD</button></div></div></div>';document.getElementById('sizeModal').innerHTML=html;document.getElementById('sizeModal').classList.add('active');}
function toggleSizeAvail(id,size){const p=S.products.find(x=>x.id===id);if(!p)return;if(!p.disabledSizes)p.disabledSizes=[];const idx=p.disabledSizes.indexOf(size);if(idx>-1)p.disabledSizes.splice(idx,1);else p.disabledSizes.push(size);save();manageSizes(id);}
function addSizeToProduct(id,size){const p=S.products.find(x=>x.id===id);if(!p)return;if(!p.sizes)p.sizes=[];const s=size||document.getElementById('newSizeInput').value.trim();if(!s)return;if(p.sizes.includes(s)){toast('Já existe!','error');return;}p.sizes.push(s);const sizeOrder=['PP','P','M','G','GG','XG','XXG','2','4','6','8','10','12','36','38','40','42','44','46'];p.sizes.sort((a,b)=>{const ia=sizeOrder.indexOf(a);const ib=sizeOrder.indexOf(b);if(ia===-1&&ib===-1)return a.localeCompare(b,undefined,{numeric:true});if(ia===-1)return 1;if(ib===-1)return 1;return ia-ib;});save();manageSizes(id);toast('Tamanho '+s+' adicionado!');}

const presetColors=[{name:'Preto',hex:'#000000'},{name:'Branco',hex:'#ffffff'},{name:'Cinza',hex:'#808080'},{name:'Vermelho',hex:'#e53935'},{name:'Azul',hex:'#1e88e5'},{name:'Verde',hex:'#43a047'},{name:'Amarelo',hex:'#fdd835'},{name:'Rosa',hex:'#ec407a'},{name:'Roxo',hex:'#8e24aa'},{name:'Laranja',hex:'#fb8c00'},{name:'Marrom',hex:'#6d4c41'},{name:'Bege',hex:'#d7ccc8'}];

function manageColors(id){const p=S.products.find(x=>x.id===id);if(!p)return;if(!p.colors)p.colors=[];const colors=p.colors;const html='<div class="modal-box" style="max-width:560px"><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button><div class="size-modal-header"><img src="'+p.img+'" alt="'+p.name+'"><h2>Cores — '+p.name+'</h2></div><p class="size-modal-subtitle">Gerencie as cores, preços e fotos por variação</p>'+(colors.length?'<div class="color-list">'+colors.map((c,i)=>'<div class="color-list-item"><div class="cl-dot" style="background:'+c.hex+'"></div><div class="cl-info"><h4>'+c.name+(c.soldOut?' <span style="color:#f44336;font-size:9px">ESGOTADO</span>':'')+'</h4><p>R$ '+c.price.toFixed(2)+' — '+c.images.length+' foto(s)</p></div><div class="cl-actions"><button class="btn-e" onclick="editColor(\''+p.id+'\','+i+')"><i class="fas fa-pen"></i></button><button class="btn-e" onclick="toggleColorSoldOut(\''+p.id+'\','+i+')" style="background:'+(c.soldOut?'#f44336':'#4caf50')+'"><i class="fas fa-'+(c.soldOut?'times':'check')+'"></i></button><button class="btn-d" onclick="removeColor(\''+p.id+'\','+i+')"><i class="fas fa-trash"></i></button></div></div>').join('')+'</div>':'<p style="color:#999;font-size:12px;margin-bottom:16px">Nenhuma cor adicionada</p>')+'<div class="color-form"><h4>Adicionar Cor</h4><p style="font-size:10px;color:#888;margin-bottom:10px">Clique numa cor ou use hex personalizado</p><div class="color-palette">'+presetColors.map(c=>'<div class="color-palette-dot" style="background:'+c.hex+'" title="'+c.name+'" onclick="prefillColor(\''+c.name+'\',\''+c.hex+'\')"></div>').join('')+'</div><div class="form-row"><div class="form-group"><label>Nome</label><input id="cName" placeholder="Ex: Preto"></div><div class="form-group"><label>Hex</label><div style="display:flex;gap:6px"><input type="color" id="cHexPicker" value="#000000" style="width:40px;height:34px;padding:2px;border:1px solid #ddd;cursor:pointer" onchange="document.getElementById(\'cHex\').value=this.value"><input id="cHex" placeholder="#000000" value="#000000"></div></div></div><div class="form-row"><div class="form-group"><label>Preço (R$)</label><input id="cPrice" type="number" step="0.01" value="'+p.price.toFixed(2)+'"></div><div class="form-group"><label>Esgotado?</label><select id="cSoldOut"><option value="false">Disponível</option><option value="true">Esgotado</option></select></div></div><div class="form-group"><label>URLs das Imagens (uma por linha)</label><textarea id="cImages" rows="3" placeholder="https://...&#10;https://..." style="resize:vertical;width:100%;padding:10px;border:1.5px solid #ddd;font-size:12px;font-family:var(--font)"></textarea></div><button class="btn-black" onclick="addColor(\''+p.id+'\')" style="width:100%;margin-top:8px"><i class="fas fa-plus"></i> ADICIONAR COR</button></div></div>';document.getElementById('sizeModal').innerHTML=html;document.getElementById('sizeModal').classList.add('active');}

function prefillColor(name,hex){document.getElementById('cName').value=name;document.getElementById('cHex').value=hex;document.getElementById('cHexPicker').value=hex;}
function addColor(id){const p=S.products.find(x=>x.id===id);if(!p)return;if(!p.colors)p.colors=[];const name=document.getElementById('cName').value.trim();const hex=document.getElementById('cHex').value.trim();const price=parseFloat(document.getElementById('cPrice').value);const soldOut=document.getElementById('cSoldOut').value==='true';const images=document.getElementById('cImages').value.split('\n').map(u=>u.trim()).filter(Boolean);if(!name||!hex){toast('Preencha nome e cor!','error');return;}if(isNaN(price)){toast('Preço inválido!','error');return;}p.colors.push({id:'cor_'+Date.now(),name,hex,price,images:images.length?images:[p.img],soldOut});save();markDirty();manageColors(id);toast('Cor '+name+' adicionada!');}

function renderAdminProductList(products){if(!products.length)return '<div class="empty-state"><i class="fas fa-box-open"></i><p>Nenhum produto</p></div>';return products.map(p=>'<div class="admin-row" style="'+(p.soldOut?'opacity:.6':'')+'"><img src="'+p.img+'"><div class="info"><h4>'+p.name+(p.soldOut?' <span style="color:#f44336;font-size:9px;font-weight:700">ESGOTADO</span>':'')+'</h4><p>R$ '+p.price.toFixed(2)+' — '+p.cat+'</p></div><div class="actions"><button class="btn-e" onclick="editProduct(\''+p.id+'\')" title="Editar"><i class="fas fa-pen"></i></button><button class="'+(p.soldOut?'btn-e':'btn-d')+'" onclick="toggleSoldOut(\''+p.id+'\')" title="'+(p.soldOut?'Marcar disponível':'Marcar esgotado')+'"><i class="fas fa-ban"></i></button><button class="btn-d" onclick="deleteProduct(\''+p.id+'\')" title="Excluir"><i class="fas fa-trash"></i></button></div></div>').join('');}
function filterAdminProducts(query){const list=document.getElementById('adminProductList');if(!list)return;if(!query.trim()){list.innerHTML=renderAdminProductList(S.products);return;}const q=query.toLowerCase();const filtered=S.products.filter(p=>p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q));list.innerHTML=renderAdminProductList(filtered);}
function toggleSoldOut(id){const p=S.products.find(x=>x.id===id);if(!p)return;p.soldOut=!p.soldOut;save();markDirty();renderAdminPage();toast(p.soldOut?p.name+' marcado como esgotado':p.name+' disponível novamente');}
function showAddProduct(){document.getElementById('productModal').classList.add('active');document.getElementById('pFormTitle').textContent='Novo Produto';document.getElementById('pForm').reset();document.getElementById('pForm').dataset.editId='';document.getElementById('pCatSelect').innerHTML='<option value="">Selecione...</option>'+S.categories.map(c=>'<option value="'+c+'">'+c+'</option>').join('');document.getElementById('pFabricName').value='';document.getElementById('pFabricDesc').value='';document.getElementById('pFabricWeight').value='';renderFabricImgSlots([]);renderImgSlots([]);}
function editProduct(id){const p=S.products.find(x=>x.id===id);if(!p)return;document.getElementById('productModal').classList.add('active');document.getElementById('pFormTitle').textContent='Editar Produto';document.getElementById('pCatSelect').innerHTML='<option value="">Selecione...</option>'+S.categories.map(c=>'<option value="'+c+'" '+(c===p.cat?'selected':'')+'>'+c+'</option>').join('');document.getElementById('pName').value=p.name;document.getElementById('pPrice').value=p.price;document.getElementById('pDesc').value=p.desc||'';document.getElementById('pSizes').value=(p.sizes||[]).join(',');document.getElementById('pFabricName').value=p.fabricName||'';document.getElementById('pFabricDesc').value=p.fabricDesc||'';document.getElementById('pFabricWeight').value=p.fabricWeight||'';document.getElementById('pForm').dataset.editId=id;const imgs=p.images&&p.images.length?p.images:(p.img?[p.img]:[]);renderImgSlots(imgs);renderFabricImgSlots(p.fabricImages||[]);}
function renderImgSlots(images){const container=document.getElementById('pImgSlots');if(!container)return;let html='';for(let i=0;i<8;i++){const url=images[i]||'';html+='<div style="position:relative"><div style="position:absolute;top:6px;left:6px;background:#000;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;z-index:2">'+(i+1)+'</div><div id="pImgBox'+i+'" style="width:100%;height:80px;border:1.5px dashed '+(url?'#4caf50':'#ddd')+';border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:'+(url?'#f0fff0':'#fafafa')+';margin-bottom:4px">'+(url?'<img src="'+url+'" style="width:100%;height:100%;object-fit:cover">':'<i class="fas fa-image" style="color:#ccc;font-size:18px"></i>')+'</div><input class="pImgInput" data-slot="'+i+'" value="'+url+'" placeholder="'+(i===0?'URL da capa...':'URL imagem '+(i+1)+'...')+'" style="width:100%;padding:7px 8px;border:1px solid #ddd;border-radius:4px;font-size:10px;font-family:var(--font)" oninput="updateSlotPreview('+i+',this.value)"></div>';} container.innerHTML=html;}
function renderFabricImgSlots(images){const container=document.getElementById('pFabricImgSlots');if(!container)return;let html='';for(let i=0;i<5;i++){const url=images[i]||'';html+='<div><div style="position:relative"><div style="position:absolute;top:3px;left:3px;background:#000;color:#fff;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;z-index:2">'+(i+1)+'</div><div id="pFabricBox'+i+'" style="width:100%;height:60px;border:1.5px dashed '+(url?'#4caf50':'#ddd')+';border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:'+(url?'#f0fff0':'#fafafa')+'">'+(url?'<img src="'+url+'" style="width:100%;height:100%;object-fit:cover">':'<i class="fas fa-image" style="color:#ccc;font-size:12px"></i>')+'</div></div><input class="pFabricImgInput" data-slot="'+i+'" value="'+url+'" placeholder="URL '+(i+1)+'" style="width:100%;padding:4px 6px;border:1px solid #ddd;border-radius:3px;font-size:9px;font-family:var(--font);margin-top:4px" oninput="updateFabricSlotPreview('+i+',this.value)"></div>';}container.innerHTML=html;}
function updateFabricSlotPreview(idx,url){const box=document.getElementById('pFabricBox'+idx);if(!box)return;if(url.trim()){box.style.border='1.5px dashed #4caf50';box.style.background='#f0fff0';box.innerHTML='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover">';}else{box.style.border='1.5px dashed #ddd';box.style.background='#fafafa';box.innerHTML='<i class="fas fa-image" style="color:#ccc;font-size:14px"></i>';}}

function updateSlotPreview(idx,url){const box=document.getElementById('pImgBox'+idx);if(!box)return;if(url.trim()){box.style.border='1.5px dashed #4caf50';box.style.background='#f0fff0';box.innerHTML='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover">';}else{box.style.border='1.5px dashed #ddd';box.style.background='#fafafa';box.innerHTML='<i class="fas fa-image" style="color:#ccc;font-size:18px"></i>';}}
function getImgSlots(){const inputs=document.querySelectorAll('.pImgInput');const urls=[];inputs.forEach(inp=>{const v=inp.value.trim();if(v)urls.push(v);});return urls;}
function saveProduct(e){e.preventDefault();const id=document.getElementById('pForm').dataset.editId;const images=getImgSlots().slice(0,8);const fabricImages=getFabricImgSlots().slice(0,5);const stockVal=document.getElementById('pStock')?document.getElementById('pStock').value:'';const data={name:document.getElementById('pName').value,price:parseFloat(document.getElementById('pPrice').value),cat:document.getElementById('pCatSelect').value,desc:document.getElementById('pDesc').value,img:images[0]||'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600&h=700&fit=crop',images:images,sizes:document.getElementById('pSizes').value.split(',').map(s=>s.trim()).filter(Boolean),stock:stockVal?parseInt(stockVal):undefined,fabricName:document.getElementById('pFabricName').value.trim(),fabricDesc:document.getElementById('pFabricDesc').value.trim(),fabricWeight:document.getElementById('pFabricWeight').value.trim(),fabricImages:fabricImages};if(!data.name||!data.price){toast('Preencha nome e preço!','error');return;}if(typeof data.stock==='number'&&data.stock===0)data.soldOut=true;if(typeof data.stock==='number'&&data.stock>0)data.soldOut=false;if(id){const p=S.products.find(x=>x.id===id);if(p)Object.assign(p,data);toast('Atualizado!');}else{S.products.push({id:Date.now().toString(),...data});toast('Adicionado!');}syncAll();save();markDirty();closeModal();renderAdminPage();}
function deleteProduct(id){if(!confirm('Excluir este produto?'))return;S.products=S.products.filter(x=>x.id!==id);S.promo.productIds=S.promo.productIds.filter(x=>x!==id);syncAll();save();markDirty();renderAdminPage();toast('Excluído!');}

function addExclusive(productId){S.exclusives.products.push({productId,stock:10,sold:0});save();markDirty();showATab('exclusives',document.querySelector('.atab.active'));toast('Produto adicionado aos exclusivos!');}
function removeExclusive(productId){if(!confirm('Remover este produto dos exclusivos?'))return;S.exclusives.products=S.exclusives.products.filter(x=>x.productId!==productId);save();markDirty();showATab('exclusives',document.querySelector('.atab.active'));toast('Removido dos exclusivos!');}
function updateExclusiveStock(productId,stock,sold){const ex=S.exclusives.products.find(x=>x.productId===productId);if(!ex)return;if(stock!==null)ex.stock=Math.max(0,stock);if(sold!==null)ex.sold=Math.max(0,sold);save();markDirty();}
function toggleExclusiveSoldOut(productId){const ex=S.exclusives.products.find(x=>x.productId===productId);if(!ex)return;if(ex.sold>=ex.stock){ex.sold=0;}else{ex.sold=ex.stock;}save();markDirty();showATab('exclusives',document.querySelector('.atab.active'));toast(ex.sold>=ex.stock?'Marcado como esgotado':'Marcado como disponível');}

<h2>Quais formas de pagamento?</h2><p>Aceitamos PIX (aprovação instantânea), cartão de crédito (até 3x sem juros) e boleto bancário (compensação em 1-2 dias úteis).</p>
<h2>Qual o prazo de entrega?</h2><p>Varia conforme a região: Sudeste 3-5 dias úteis, Sul 4-6 dias, demais regiões 5-8 dias úteis. Frete grátis para compras acima de R$199.</p>
<h2>Como rastrear meu pedido?</h2><p>Após o envio, você receberá o código de rastreio por email. Use-o no site dos Correios ou transportadora.</p>
<h2>Posso trocar ou devolver?</h2><p>Sim! Você tem 7 dias após o recebimento. O produto deve estar sem uso, com etiquetas. A primeira troca é gratuita.</p>
<h2>Os tamanhos são fiéis?</h2><p>Sim, seguimos a tabela de medidas disponível em cada produto. Em caso de dúvida, consulte o Guia de Tamanhos ou escolha o tamanho maior.</p>
<h2>O que são os Drops Exclusivos?</h2><p>São peças em edição limitada, com estoque reduzido. Quando acabam, não são repostas. Fique atento às notificações!</p>
<h2>Como entro em contato?</h2><p>Email: contato@kazin.com.br | Instagram: @kazin.store | WhatsApp: em breve</p>

function initPromoCanvas(){const canvas=document.getElementById('promoCanvas');if(!canvas)return;const ctx=canvas.getContext('2d');const section=canvas.parentElement;let w,h,particles=[],mouse={x:-100,y:-100},promoAnimId=null;function resize(){w=canvas.width=section.offsetWidth;h=canvas.height=section.offsetHeight;}resize();window.addEventListener('resize',resize);for(let i=0;i<30;i++){particles.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,alpha:Math.random()*.4+.1});}section.addEventListener('mousemove',e=>{const rect=section.getBoundingClientRect();mouse.x=e.clientX-rect.left;mouse.y=e.clientY-rect.top;});section.addEventListener('mouseleave',()=>{mouse.x=-100;mouse.y=-100;});function draw(){if(animsPaused){promoAnimId=null;return;}ctx.clearRect(0,0,w,h);particles.forEach(p=>{const dx=mouse.x-p.x;const dy=mouse.y-p.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){const force=(150-dist)/150;p.vx-=dx*force*.003;p.vy-=dy*force*.003;p.alpha=Math.min(.8,.1+force*.6);}else{p.alpha+=(Math.random()*.4+.1-p.alpha)*.02;}p.x+=p.vx;p.y+=p.vy;p.vx*=.99;p.vy*=.99;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+p.alpha+')';ctx.fill();});promoAnimId=requestAnimationFrame(draw);}draw();}

function initNeonCanvas(canvasId,neonColor){const canvas=document.getElementById(canvasId);if(!canvas)return;const ctx=canvas.getContext('2d');const section=canvas.parentElement;let w,h,particles=[],mouse={x:-100,y:-100};function resize(){w=canvas.width=section.offsetWidth;h=canvas.height=section.offsetHeight;}resize();window.addEventListener('resize',resize);for(let i=0;i<20;i++){particles.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*1.2+.4,alpha:Math.random()*.2+.05});}section.addEventListener('mousemove',e=>{const rect=section.getBoundingClientRect();mouse.x=e.clientX-rect.left;mouse.y=e.clientY-rect.top;});section.addEventListener('mouseleave',()=>{mouse.x=-100;mouse.y=-100;});function draw(){if(animsPaused)return;ctx.clearRect(0,0,w,h);particles.forEach(p=>{const dx=mouse.x-p.x;const dy=mouse.y-p.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){const force=(120-dist)/120;p.vx-=dx*force*.002;p.vy-=dy*force*.002;p.alpha=Math.min(.7,.05+force*.5);}else{p.alpha+=(Math.random()*.2+.05-p.alpha)*.015;}p.x+=p.vx;p.y+=p.vy;p.vx*=.995;p.vy*=.995;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=neonColor.replace('A)',p.alpha+')');ctx.fill();});requestAnimationFrame(draw);}draw();}

// ========== TILT 3D CARDS ==========
function initTilt(){

let ticking=false;
document.addEventListener('mousemove',function(e){
if(animsPaused||ticking)return;ticking=true;
requestAnimationFrame(()=>{ticking=false;
const card=e.target.closest?e.target.closest(selector):null;
if(!card)return;
const rect=card.getBoundingClientRect();
const x=e.clientX-rect.left;const y=e.clientY-rect.top;
if(x<0||y<0||x>rect.width||y>rect.height)return;
const centerX=rect.width/2;const centerY=rect.height/2;
const rotateX=(y-centerY)/centerY*-5;
const rotateY=(x-centerX)/centerX*5;
card.style.transform='perspective(800px) rotateX('+rotateX+'deg) rotateY('+rotateY+'deg) translateY(-6px) scale(1.02)';
card.style.setProperty('--x',(x/rect.width*100)+'%');
card.style.setProperty('--y',(y/rect.height*100)+'%');
});});
document.addEventListener('mouseout',function(e){
const card=e.target.closest?e.target.closest(selector):null;
if(card&&!card.contains(e.relatedTarget)){
card.style.transition='transform .5s cubic-bezier(.25,.8,.25,1),box-shadow .5s ease';
card.style.transform='';
}});}

function retryFirebaseAndSave(){if(firebaseRetryCount>=3){updateSaveStatus('error');toast('Firebase não conectou. Dados salvos localmente.','error');return;}firebaseRetryCount++;setTimeout(()=>{if(firebaseReady){firebaseRetryCount=0;saveToFirestore();}else{initFirebase();setTimeout(()=>retryFirebaseAndSave(),2000);}},1500);}
function loadFromFirestore(){if(!firebaseReady||typeof firebase==='undefined'||!firebase.firestore||firestoreLoaded)return;firestoreLoaded=true;const db=firebase.firestore();db.collection('store').doc('config').get().then(doc=>{if(doc.exists){const data=doc.data();if(data.products&&data.products.length)S.products=data.products;if(data.categories)S.categories=data.categories;if(data.promo)S.promo=data.promo;if(data.featured)S.featured=data.featured;if(data.newCollection)S.newCollection=data.newCollection;if(data.limited)S.limited=data.limited;if(data.homeImages)S.homeImages=data.homeImages;if(data.texts)S.texts=data.texts;if(data.theme)S.theme=data.theme;if(data.orders)S.orders=data.orders;if(data.leads)S.leads=data.leads;if(data.drops)S.drops=data.drops;if(data.exclusives)S.exclusives=data.exclusives;S.categories=S.categories.filter(c=>c!=='Infantil');S.products=S.products.filter(p=>p.cat!=='Infantil');S.products.forEach(p=>{const def=defaultProducts.find(d=>d.id===p.id||d.name===p.name);if(def&&def.fabricName&&!p.fabricName){p.fabricName=def.fabricName;p.fabricWeight=def.fabricWeight;p.fabricDesc=def.fabricDesc;p.fabricImages=def.fabricImages;}else if(!p.fabricName){p.fabricName='Algodão Premium';p.fabricWeight='180g/m²';p.fabricDesc='Tecido de alta qualidade com toque macio e durabilidade superior.';p.fabricImages=['https://images.unsplash.com/photo-1558171813-4c088753af8f?w=200&h=200&fit=crop','https://images.unsplash.com/photo-1528459105426-b9548367069b?w=200&h=200&fit=crop'];}});save();console.log('Firestore loaded');renderCurrentPage();}else{console.log('No Firestore data, saving local to cloud');saveToFirestore();}}).catch(e=>{console.error('Firestore load error:',e);firestoreLoaded=false;});}

stars.push({x:Math.random()*w,y:Math.random()*h,r:bright?Math.random()*1.2+0.6:Math.random()*0.6+0.2,baseAlpha:bright?Math.random()*0.5+0.4:Math.random()*0.3+0.1,pulseSpeed:Math.random()*0.015+0.005,offset:Math.random()*Math.PI*2,vx:(Math.random()-0.5)*0.05,vy:(Math.random()-0.5)*0.03,bright});}
let t=0;
function draw(){
if(animsPaused){exStarsAnimId=null;return;}
ctx.clearRect(0,0,w,h);t++;
stars.forEach(s=>{
s.x+=s.vx;s.y+=s.vy;
if(s.x<0)s.x=w;if(s.x>w)s.x=0;if(s.y<0)s.y=h;if(s.y>h)s.y=0;
const pulse=Math.sin(t*s.pulseSpeed+s.offset);
const alpha=s.baseAlpha+pulse*s.baseAlpha*0.7;
if(alpha<=0)return;
if(s.bright){
ctx.beginPath();ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2);
ctx.fillStyle='rgba(212,175,55,'+Math.max(0,alpha*0.08)+')';ctx.fill();}
ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle='rgba(212,175,55,'+Math.max(0,alpha)+')';ctx.fill();});
exStarsAnimId=requestAnimationFrame(draw);}
draw();}

// ========== GALAXY SHADER (CART BG) ==========
let galaxyAnimId=null;
function initGalaxy(){
const canvas=document.getElementById('galaxyCanvas');if(!canvas)return;if(galaxyAnimId)return;
const gl=canvas.getContext('webgl',{alpha:false,premultipliedAlpha:false});if(!gl)return;
function resize(){const p=canvas.parentElement;canvas.width=p.offsetWidth;canvas.height=p.offsetHeight;gl.viewport(0,0,canvas.width,canvas.height);}
resize();window.addEventListener('resize',resize);

const vs=`attribute vec2 position;varying vec2 vUv;void main(){vUv=position*0.5+0.5;gl_Position=vec4(position,0,1);}`;
const fs=`precision highp float;
uniform float uTime;uniform vec2 uResolution;uniform float uStarSpeed;uniform float uDensity;uniform float uHueShift;uniform float uSpeed;uniform float uGlowIntensity;uniform float uTwinkleIntensity;uniform float uRotationSpeed;
varying vec2 vUv;
#define NUM_LAYER 4.0
#define MAT45 mat2(0.7071,-0.7071,0.7071,0.7071)
float Hash21(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
float tri(float x){return abs(fract(x)*2.0-1.0);}
float tris(float x){float t=fract(x);return 1.0-smoothstep(0.0,1.0,abs(2.0*t-1.0));}
float trisn(float x){float t=fract(x);return 2.0*(1.0-smoothstep(0.0,1.0,abs(2.0*t-1.0)))-1.0;}
vec3 hsv2rgb(vec3 c){vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0);vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y);}
float Star(vec2 uv,float flare){float d=length(uv);float m=(0.05*uGlowIntensity)/d;float rays=smoothstep(0.0,1.0,1.0-abs(uv.x*uv.y*1000.0));m+=rays*flare*uGlowIntensity;uv*=MAT45;rays=smoothstep(0.0,1.0,1.0-abs(uv.x*uv.y*1000.0));m+=rays*0.3*flare*uGlowIntensity;m*=smoothstep(1.0,0.2,d);return m;}
vec3 StarLayer(vec2 uv){vec3 col=vec3(0.0);vec2 gv=fract(uv)-0.5;vec2 id=floor(uv);for(int y=-1;y<=1;y++){for(int x=-1;x<=1;x++){vec2 offset=vec2(float(x),float(y));vec2 si=id+offset;float seed=Hash21(si);float size=fract(seed*345.32);float glossLocal=tri(uStarSpeed/(3.0*seed+1.0));float flareSize=smoothstep(0.9,1.0,size)*glossLocal;float red=smoothstep(0.2,1.0,Hash21(si+1.0))+0.2;float blu=smoothstep(0.2,1.0,Hash21(si+3.0))+0.2;float grn=min(red,blu)*seed;vec3 base=vec3(red,grn,blu);float hue=atan(base.g-base.r,base.b-base.r)/(6.28318)+0.5;hue=fract(hue+uHueShift/360.0);float sat=length(base-vec3(dot(base,vec3(0.299,0.587,0.114))))*0.0;float val=max(max(base.r,base.g),base.b);base=hsv2rgb(vec3(hue,sat,val));vec2 pad=vec2(tris(seed*34.0+uTime*uSpeed/10.0),tris(seed*38.0+uTime*uSpeed/30.0))-0.5;float star=Star(gv-offset-pad,flareSize);float twinkle=trisn(uTime*uSpeed+seed*6.2831)*0.5+1.0;twinkle=mix(1.0,twinkle,uTwinkleIntensity);star*=twinkle;col+=star*size*base;}}return col;}
void main(){vec2 uv=(vUv*uResolution-uResolution*0.5)/uResolution.y;float a=uTime*uRotationSpeed;mat2 rot=mat2(cos(a),-sin(a),sin(a),cos(a));uv=rot*uv;vec3 col=vec3(0.0);for(float i=0.0;i<1.0;i+=1.0/NUM_LAYER){float depth=fract(i+uStarSpeed*uSpeed);float scale=mix(20.0*uDensity,0.5*uDensity,depth);float fade=depth*smoothstep(1.0,0.9,depth);col+=StarLayer(uv*scale+i*453.32)*fade;}gl_FragColor=vec4(col,1.0);}`;

function compile(src,type){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const vShader=compile(vs,gl.VERTEX_SHADER);
const fShader=compile(fs,gl.FRAGMENT_SHADER);
const prog=gl.createProgram();gl.attachShader(prog,vShader);gl.attachShader(prog,fShader);gl.linkProgram(prog);gl.useProgram(prog);

const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const pos=gl.getAttribLocation(prog,'position');gl.enableVertexAttribArray(pos);gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);

const uTime=gl.getUniformLocation(prog,'uTime');
const uRes=gl.getUniformLocation(prog,'uResolution');
const uStarSpeed=gl.getUniformLocation(prog,'uStarSpeed');
const uDensity=gl.getUniformLocation(prog,'uDensity');
const uHueShift=gl.getUniformLocation(prog,'uHueShift');
const uSpeed=gl.getUniformLocation(prog,'uSpeed');
const uGlow=gl.getUniformLocation(prog,'uGlowIntensity');
const uTwinkle=gl.getUniformLocation(prog,'uTwinkleIntensity');
const uRotSpeed=gl.getUniformLocation(prog,'uRotationSpeed');

gl.uniform1f(uDensity,1.1);gl.uniform1f(uHueShift,140.0);gl.uniform1f(uSpeed,0.4);gl.uniform1f(uGlow,0.3);gl.uniform1f(uTwinkle,0.4);gl.uniform1f(uRotSpeed,0.1);

let startTime=performance.now();
function draw(){if(animsPaused){galaxyAnimId=null;return;}galaxyAnimId=requestAnimationFrame(draw);const t=(performance.now()-startTime)*0.001;gl.uniform1f(uTime,t);gl.uniform1f(uStarSpeed,t*0.5/10.0);gl.uniform2f(uRes,canvas.width,canvas.height);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);}
draw();
}

function calcFrete(cep){
