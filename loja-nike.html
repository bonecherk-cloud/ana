/* THEME TRANSITION EXPLOSION */
.theme-explosion{position:fixed;top:50%;left:50%;width:0;height:0;border-radius:50%;z-index:99998;pointer-events:none;transform:translate(-50%,-50%)}
.theme-explosion.dark{background:radial-gradient(circle,#000 0%,#0a0a0a 100%)}
.theme-explosion.light{background:radial-gradient(circle,#fff 0%,#f7f7f7 100%)}
.theme-explosion.animate{animation:themeExplode 1.2s cubic-bezier(.22,.61,.36,1) forwards}
@keyframes themeExplode{0%{width:0;height:0;opacity:1;border-radius:50%}60%{width:300vmax;height:300vmax;opacity:1;border-radius:50%}100%{width:300vmax;height:300vmax;opacity:0;border-radius:0}}

/* PAGE TRANSITION FLASH */
.page-flash{position:fixed;inset:0;z-index:99997;pointer-events:none;opacity:0;transition:none}
.page-flash.white{background:#fff}
.page-flash.black{background:#000}
.page-flash.active{animation:pageFlash .7s cubic-bezier(.22,.61,.36,1) forwards}
.page-flash .flash-logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(2rem,6vw,4rem);font-weight:900;letter-spacing:4px;opacity:0}
.page-flash.white .flash-logo{color:#000}
.page-flash.black .flash-logo{color:#fff}
.page-flash.active .flash-logo{animation:flashLogo .7s cubic-bezier(.22,.61,.36,1) forwards}
.page-flash .flash-beam{position:absolute;top:0;left:50%;width:4px;height:100%;transform:translateX(-50%);opacity:0;filter:blur(0)}
.page-flash.white .flash-beam{background:linear-gradient(180deg,transparent,rgba(0,0,0,.6) 30%,rgba(0,0,0,.9) 50%,rgba(0,0,0,.6) 70%,transparent)}
.page-flash.black .flash-beam{background:linear-gradient(180deg,transparent,rgba(255,255,255,.6) 30%,rgba(255,255,255,.9) 50%,rgba(255,255,255,.6) 70%,transparent)}
.page-flash.active .flash-beam{animation:flashBeam .7s cubic-bezier(.22,.61,.36,1) forwards}
@keyframes pageFlash{0%{opacity:0}12%{opacity:1}65%{opacity:1}100%{opacity:0}}
@keyframes flashLogo{0%{opacity:0;transform:translate(-50%,-50%) scale(1.4);filter:blur(6px)}25%{opacity:1;transform:translate(-50%,-50%) scale(1);filter:blur(0)}65%{opacity:1;transform:translate(-50%,-50%) scale(1);filter:blur(0)}100%{opacity:0;transform:translate(-50%,-50%) scale(.95);filter:blur(3px)}}
@keyframes flashBeam{0%{opacity:0;width:4px;filter:blur(0)}15%{opacity:1;width:6px;filter:blur(2px)}40%{opacity:1;width:60vw;filter:blur(30px)}100%{opacity:0;width:100vw;filter:blur(60px)}}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#000;color:var(--text-secondary);overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::selection{background:#0066ff;color:#fff}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--font)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
img{display:block}

#loader{position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 1.2s cubic-bezier(.25,.8,.25,1),visibility 1.2s}
#loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
#loader .lt{font-size:120px;font-weight:900;color:#fff;letter-spacing:8px;animation:loaderShrink 2.4s cubic-bezier(.16,1,.3,1) forwards;position:relative;z-index:2}
#loader .lt::before{content:'';position:absolute;top:50%;left:-20%;width:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent);transform:translateY(-50%);animation:loaderFlare 2.4s cubic-bezier(.25,.8,.25,1) .4s forwards}
#loader .lt::after{content:'';position:absolute;inset:-30px;background:radial-gradient(ellipse at center,rgba(255,255,255,.1) 0%,transparent 70%);animation:loaderGlow 2.4s ease forwards;border-radius:50%}
#loader .lt{font-size:120px;font-weight:900;color:#fff;letter-spacing:8px;animation:loaderShrink 2.4s cubic-bezier(.16,1,.3,1) forwards;position:relative;z-index:2}
#loader .lt::before{content:'';position:absolute;top:50%;left:-20%;width:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent);transform:translateY(-50%);animation:loaderFlare 2.4s cubic-bezier(.25,.8,.25,1) .4s forwards}
#loader .lt::after{content:'';position:absolute;inset:-30px;background:radial-gradient(ellipse at center,rgba(255,255,255,.1) 0%,transparent 70%);animation:loaderGlow 2.4s ease forwards;border-radius:50%}
@keyframes loaderShrink{0%{font-size:120px;letter-spacing:8px;opacity:0;filter:blur(6px)}12%{opacity:1;filter:blur(0)}60%{font-size:80px;letter-spacing:0px;opacity:1}100%{font-size:52px;letter-spacing:-3px;opacity:1}}
@keyframes loaderFlare{0%{width:0;left:-20%;opacity:0}35%{opacity:0}55%{opacity:1;width:140%;left:-20%}100%{opacity:0;width:40%;left:120%}}
@keyframes loaderGlow{0%{opacity:0;transform:scale(2.5)}25%{opacity:.5;transform:scale(1.5)}100%{opacity:0;transform:scale(.6)}}

/* SITE REVEAL AFTER LOADER */
#app{opacity:0;transform:scale(.98);transition:opacity 1.4s cubic-bezier(.25,.8,.25,1),transform 1.4s cubic-bezier(.25,.8,.25,1)}
#app{opacity:0;transform:scale(.98);transition:opacity .8s ease,transform .8s ease}
#app.revealed{opacity:1;transform:scale(1)}
.site-reveal-beam{position:fixed;top:0;left:50%;width:4px;height:100vh;transform:translateX(-50%);background:linear-gradient(180deg,transparent,rgba(255,255,255,.9) 30%,rgba(255,255,255,1) 50%,rgba(255,255,255,.9) 70%,transparent);z-index:99998;pointer-events:none;opacity:0;animation:none;filter:blur(0px)}
.site-reveal-beam.active{animation:beamReveal 1.8s cubic-bezier(.25,.8,.25,1) forwards}
.site-reveal-beam::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:100%;background:radial-gradient(ellipse at center,rgba(255,255,255,.15) 0%,transparent 70%);filter:blur(20px)}
.site-reveal-beam::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:100%;background:radial-gradient(ellipse at center,rgba(255,255,255,.06) 0%,transparent 60%);filter:blur(40px);animation:beamPulse 1s ease-in-out 3}
@keyframes beamReveal{0%{opacity:0;width:4px;filter:blur(0px)}20%{opacity:1;width:6px;filter:blur(1px)}50%{opacity:1;width:100vw;filter:blur(30px)}100%{opacity:0;width:100vw;filter:blur(60px)}}
@keyframes beamPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}

.header{position:sticky;top:0;z-index:1000;background:var(--bg-base);transition:var(--transition)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 clamp(1.5rem,4vw,4rem);display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-size:1rem;font-weight:700;color:var(--text-primary);letter-spacing:0.1em;text-transform:uppercase}
nav{display:flex;gap:2rem}
nav a{font-size:0.75rem;font-weight:400;text-transform:uppercase;letter-spacing:0.08em;color:#b0b0b0;padding:18px 0;transition:color .3s ease;position:relative;border:none}
nav a::after{content:'';position:absolute;bottom:14px;left:0;width:0;height:1px;background:var(--text-primary);transition:width .3s cubic-bezier(.16,1,.3,1)}
nav a:hover,nav a.active{color:var(--text-primary)}
nav a:hover::after,nav a.active::after{width:100%}
.h-actions{display:flex;gap:10px;align-items:center}
.h-actions button{background:none;border:none;font-size:16px;color:#b0b0b0;position:relative;padding:8px;transition:color .3s ease}
.h-actions button:hover{color:var(--text-primary)}
.badge{position:absolute;top:0;right:0;background:var(--text-primary);color:var(--bg-base);font-size:8px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}

.page{display:none;min-height:calc(100vh - 56px)}
.page.active{display:block}
@keyframes pageEnter{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageExit{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-20px)}}
.page.page-exit{animation:pageExit .25s cubic-bezier(.25,.8,.25,1) both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* HERO */
.hero{height:calc(100vh - 56px);position:relative;overflow:hidden;display:flex;align-items:center;background:transparent;z-index:1}
.hero-content{position:relative;z-index:3}
.hero::after{content:'';position:absolute;inset:0;z-index:1;opacity:.03;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
.hero-slides{position:absolute;inset:0;z-index:1}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.hero-slide.active{opacity:1}
.hero-slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.5}
.hero-dots{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px}
.hero-dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);border:none;cursor:pointer;transition:all .3s ease}
.hero-dot.active{background:var(--text-primary);transform:scale(1.3)}
.hero-content{position:relative;z-index:2;max-width:1400px;margin:0 auto;padding:0 clamp(1.5rem,4vw,4rem);width:100%;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;height:100%}
.hero-tag{display:inline-block;background:transparent;color:var(--text-tertiary);padding:8px 0;font-size:0.7rem;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:28px;border-bottom:1px solid var(--border-medium)}
.hero h1{font-size:clamp(3.5rem,8vw,7rem);font-weight:800;color:var(--text-primary);line-height:.92;letter-spacing:-0.03em;margin-bottom:28px;-webkit-text-fill-color:var(--text-primary)}
.hero p{font-size:1rem;color:var(--text-secondary);max-width:440px;margin-bottom:44px;line-height:1.8;font-weight:300}
.hero-btn{display:inline-flex;align-items:center;gap:0.75rem;background:transparent;color:var(--text-primary);padding:0.9rem 2rem;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;border:1px solid var(--border-strong);transition:all .3s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.hero-btn:hover{background:var(--text-primary);color:var(--bg-base);border-color:var(--text-primary)}
.hero-scroll-indicator{position:absolute;bottom:80px;right:clamp(1.5rem,4vw,4rem);z-index:10;display:flex;flex-direction:column;align-items:center;gap:8px;animation:float 2s ease-in-out infinite}
.hero-scroll-indicator span{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);writing-mode:vertical-rl}
.hero-scroll-indicator::after{content:'';width:1px;height:40px;background:linear-gradient(to bottom,var(--border-strong),transparent)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

/* 3D TILT CARDS */
.collection-card{perspective:800px;transform-style:preserve-3d}
.collection-card .card-inner{transition:transform .15s ease-out}
.collection-card:hover .card-inner{transform:translateZ(10px)}

/* CARD HOVER ANIMATIONS - organic & alive */
.p-card,.collection-card,.exclusive-card,.fav-card,.hs-new-side-card,.hs-new-banner-main{
transition:transform .4s cubic-bezier(.2,.9,.3,1),box-shadow .4s cubic-bezier(.2,.9,.3,1);
will-change:transform,box-shadow}
.p-card:hover,.exclusive-card:hover,.fav-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.05)}
.collection-card:hover{
transform:translateY(-6px) scale(1.015);
box-shadow:0 16px 32px rgba(0,0,0,.4)}
.hs-new-side-card:hover,.hs-new-banner-main:hover{
transform:translateY(-4px) scale(1.02);
box-shadow:0 12px 28px rgba(0,0,0,.35)}
.p-card img,.collection-card img,.exclusive-card img,.fav-card img{
transition:transform .6s cubic-bezier(.2,.9,.3,1),filter .4s ease}
.p-card:hover img,.exclusive-card:hover img,.fav-card:hover img{
transform:scale(1.08);filter:brightness(1.05)}
.collection-card:hover img{transform:scale(1.06);filter:brightness(1.05)}
.p-card::after,.exclusive-card::after{
content:'';position:absolute;inset:0;opacity:0;
background:radial-gradient(circle at var(--x,50%) var(--y,50%),rgba(255,255,255,.08),transparent 60%);
transition:opacity .3s;pointer-events:none;z-index:2}
.p-card:hover::after,.exclusive-card:hover::after{opacity:1}
.collection-card-info,.p-card-overlay{
transition:transform .4s cubic-bezier(.2,.9,.3,1),opacity .3s}
.collection-card:hover .collection-card-info{transform:translateY(-4px)}
.p-card:hover .p-card-overlay{transform:translateY(-2px)}

@keyframes cardPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.05)}50%{box-shadow:0 0 0 4px rgba(255,255,255,.02)}}
.exclusive-card:not(.is-sold-out):hover{animation:cardPulse 2s ease-in-out infinite}

/* SPOTLIGHT EFFECT */
.spotlight-card{--x:50%;--y:50%;position:relative}
.spotlight-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle at var(--x) var(--y),rgba(255,255,255,.06),transparent 60%);z-index:1;pointer-events:none;opacity:0;transition:opacity .3s}
.spotlight-card:hover::before{opacity:1}

/* GLASS ELEMENTS */
.glass-card{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:12px}

/* ROTATING GLOW BORDER */
@property --glow-angle{syntax:'<angle>';initial-value:0deg;inherits:false}
.glow-border{position:relative;border-radius:12px;overflow:visible}
.glow-border::before{content:'';position:absolute;inset:-1px;border-radius:inherit;background:conic-gradient(from var(--glow-angle),transparent 40%,rgba(255,255,255,.3) 50%,transparent 60%);animation:rotateGlow 4s linear infinite;z-index:-1}
.glow-border::after{content:'';position:absolute;inset:-1px;border-radius:inherit;background:conic-gradient(from var(--glow-angle),transparent 40%,rgba(255,255,255,.15) 50%,transparent 60%);animation:rotateGlow 4s linear infinite;filter:blur(8px);z-index:-2;opacity:.6}
@keyframes rotateGlow{to{--glow-angle:360deg}}

/* FOOTER */
.footer{position:relative;overflow:hidden}

/* DEPTH CARDS - layered float */
.depth-card-wrapper{transform-style:preserve-3d;perspective:1000px}
.p-card,.collection-card{transform-style:preserve-3d;backface-visibility:hidden}

/* WIREFRAME SPHERE CANVAS */
.sphere-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.3}

/* STATS SECTION relative for canvas */
.stats-section{position:relative;overflow:hidden}

/* AURORA BACKGROUND */
.aurora-bg{background:linear-gradient(-45deg,#000,#0a0a0a,#000,#111);background-size:400% 400%;animation:auroraShift 15s ease infinite;position:relative}
.aurora-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(255,255,255,.02) 0%,transparent 50%),radial-gradient(ellipse at 70% 30%,rgba(255,255,255,.015) 0%,transparent 40%);pointer-events:none}
@keyframes auroraShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* 3D FLOATING ELEMENTS */
.float-3d{animation:float3d 6s ease-in-out infinite;transform-style:preserve-3d}
@keyframes float3d{0%,100%{transform:translateY(0) rotateX(0) rotateY(0)}25%{transform:translateY(-8px) rotateX(2deg) rotateY(-2deg)}50%{transform:translateY(-4px) rotateX(-1deg) rotateY(2deg)}75%{transform:translateY(-10px) rotateX(1deg) rotateY(-1deg)}}

/* GRADIENT TEXT */
.gradient-text{background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.6) 50%,#fff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientText 4s linear infinite}
@keyframes gradientText{0%{background-position:0% center}100%{background-position:200% center}}

/* DEPTH LAYERS */
.depth-section{perspective:1200px;overflow:hidden}
.depth-layer-back{transform:translateZ(-50px) scale(1.05);transition:transform .6s ease-out}
.depth-layer-front{transform:translateZ(30px);transition:transform .6s ease-out}

/* BENEFITS BAR */
.benefits-bar{background:transparent;padding:32px clamp(1.5rem,4vw,4rem);display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1400px;margin:0 auto}
.benefit-item{display:flex;align-items:center;gap:12px;justify-content:center;padding:16px 20px}
.benefit-item i{font-size:14px;color:var(--text-tertiary)}
.benefit-item span{font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary)}

/* SPLIT BANNER */
.split-banner{display:flex;align-items:center;justify-content:center;min-height:200px;position:relative;text-align:center;padding:clamp(4rem,8vh,6rem) clamp(1.5rem,4vw,4rem)}
.split-banner-img{position:relative;overflow:hidden}
.split-banner-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.split-banner-img:hover img{transform:scale(1.03)}
.split-banner-text{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:clamp(2.5rem,5vw,4rem);background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:20px;color:var(--text-primary);position:relative;max-width:600px;width:100%}
.split-banner-text .sbt-tag{font-size:0.7rem;font-weight:400;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-tertiary);margin-bottom:16px}
.split-banner-text h2{font-size:clamp(1.75rem,4vw,3rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:16px;line-height:1;color:var(--text-primary)}
.split-banner-text p{font-size:0.9rem;color:var(--text-secondary);line-height:1.7;margin-bottom:28px;max-width:480px}
.split-banner-text .sbt-btn{display:inline-flex;align-items:center;gap:0.75rem;padding:0.9rem 2rem;border:1px solid rgba(255,255,255,.15);color:var(--text-primary);font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;background:none;transition:all .3s cubic-bezier(.16,1,.3,1);cursor:pointer}
.split-banner-text .sbt-btn:hover{background:var(--text-primary);color:var(--bg-base);border-color:var(--text-primary)}

/* CATEGORIES VISUAL */
.categories-section{padding:clamp(4rem,8vh,7rem) clamp(1.5rem,4vw,4rem);max-width:100%;margin:0 auto;position:relative;overflow:hidden;background:transparent}
.categories-section h2{font-size:clamp(1.2rem,3vw,1.8rem);font-weight:700;letter-spacing:-0.02em;margin-bottom:32px;text-align:left;color:var(--text-primary);position:relative;z-index:3;text-transform:uppercase;max-width:1400px;margin-left:auto;margin-right:auto;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;max-width:1400px;margin:0 auto;position:relative;z-index:3}
.cat-card{position:relative;overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);border:none;aspect-ratio:4/5}
.cat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.1) 50%,transparent 100%);z-index:1;transition:opacity .4s}
.cat-card::after{content:none}
.cat-card:hover{transform:translateY(-4px)}
.cat-card img{width:100%;height:100%;object-fit:cover;object-position:top;transition:transform .6s cubic-bezier(.16,1,.3,1),filter .4s;filter:brightness(.85)}
.cat-card:hover img{transform:scale(1.05);filter:brightness(.7)}
.cat-card .cat-label{position:absolute;bottom:0;left:0;right:0;padding:24px;display:flex;align-items:flex-start;justify-content:flex-end;flex-direction:column;gap:4px;color:#fff;z-index:2}
.cat-card .cat-label h3{font-size:1.1rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;transition:transform .3s cubic-bezier(.16,1,.3,1)}
.cat-card:hover .cat-label h3{transform:translateY(-3px)}
.cat-card .cat-label span{font-size:0.7rem;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:0.08em;transition:color .3s}
.cat-card:hover .cat-label span{color:rgba(255,255,255,1)}

/* DROPS SECTION */
.drops-section{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;padding:0}
.drops-inner{position:relative;z-index:2;width:100%;height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center}
.drops-bg{position:absolute;inset:0;z-index:0}
.drops-bg img{width:100%;height:100%;object-fit:cover;filter:brightness(.4)}
.drops-images-1{position:absolute;inset:0;z-index:0}
.drops-images-1 img{width:100%;height:100%;object-fit:cover;filter:brightness(.3)}
.drops-images-2{display:grid;grid-template-columns:1fr 1fr;position:absolute;inset:0;z-index:0}
.drops-images-2 img{width:100%;height:100%;object-fit:cover;filter:brightness(.3)}
.drops-images-3{display:grid;grid-template-columns:1fr 1fr 1fr;position:absolute;inset:0;z-index:0}
.drops-images-3 img{width:100%;height:100%;object-fit:cover;filter:brightness(.25)}
.drops-images-4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;position:absolute;inset:0;z-index:0}
.drops-images-4 img{width:100%;height:100%;object-fit:cover;filter:brightness(.25)}
.drops-content{position:relative;z-index:3;padding:60px clamp(2rem,5vw,5rem);display:flex;flex-direction:column;justify-content:center;align-items:flex-start}
.drops-badge{display:inline-block;background:rgba(212,175,55,.15);color:#d4af37;padding:6px 16px;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;border:1px solid rgba(212,175,55,.3);animation:dropPulse 2s ease-in-out infinite}
.drops-content h2{font-size:clamp(3rem,8vw,6rem);font-weight:900;color:#fff;letter-spacing:-0.04em;line-height:.9;margin-bottom:16px;text-transform:uppercase}
.drops-content p{font-size:clamp(0.9rem,1.5vw,1.2rem);color:rgba(255,255,255,.6);margin-bottom:36px;font-weight:300;max-width:400px;line-height:1.6}
.drops-countdown{display:flex;gap:20px;margin-bottom:36px}
.drops-countdown .dc-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,.05);backdrop-filter:blur(8px);padding:16px 20px;border:1px solid rgba(255,255,255,.1)}
.drops-countdown .dc-num{font-size:clamp(2rem,4vw,3rem);font-weight:900;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
.drops-countdown .dc-lbl{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.drops-stock{margin-bottom:36px}
.drops-stock-bar{width:280px;height:4px;background:rgba(255,255,255,.1);overflow:hidden}
.drops-stock-fill{height:100%;background:linear-gradient(90deg,#d4af37,#e8c547);transition:width .5s ease}
.drops-stock-text{font-size:12px;color:rgba(255,255,255,.7);font-weight:600;margin-top:8px}
.drops-stock-text strong{color:#fff}
.drops-cta{display:inline-block;padding:20px 52px;background:#fff;color:#000;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:2px;border:none;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.drops-cta:hover{background:var(--text-primary);color:var(--bg-base);transform:scale(1.05)}
.drops-cta::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:translateX(-100%);transition:none}
.drops-cta:hover::after{animation:dropShine .6s forwards}

/* DROPS CAROUSEL */
.drops-carousel{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;height:100%}
.drops-carousel-track{position:relative;width:100%;max-width:400px;aspect-ratio:3/4;overflow:hidden}
.drops-carousel-slide{position:absolute;inset:0;opacity:0;transition:opacity .6s ease,transform .6s ease;transform:scale(.95)}
.drops-carousel-slide.active{opacity:1;transform:scale(1)}
.drops-carousel-slide img{width:100%;height:100%;object-fit:cover}
.drops-carousel-slide .dc-slide-info{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);color:#fff}
.drops-carousel-slide .dc-slide-info h4{font-size:14px;font-weight:700;margin-bottom:4px}
.drops-carousel-slide .dc-slide-info span{font-size:18px;font-weight:900}
.drops-carousel-nav{display:flex;gap:8px;margin-top:20px}
.drops-carousel-nav button{width:10px;height:10px;border:2px solid rgba(255,255,255,.4);background:transparent;cursor:pointer;transition:all .3s;padding:0}
.drops-carousel-nav button.active{background:#fff;border-color:#fff;transform:scale(1.2)}
.drops-carousel-arrows{position:absolute;top:50%;left:0;right:0;display:flex;justify-content:space-between;padding:0 10px;transform:translateY(-50%);pointer-events:none}
.drops-carousel-arrows button{width:36px;height:36px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;pointer-events:all}
.drops-carousel-arrows button:hover{background:rgba(255,255,255,.2)}

@keyframes dropPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}
@keyframes dropShine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* SPARKLE PARTICLES */
.cat-sparkles{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.cat-sparkle{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:0;animation:sparkle var(--dur,4s) var(--delay,0s) infinite;transition:none;will-change:transform,opacity}

/* STATS SECTION */
.stats-section{background:transparent;padding:clamp(4rem,8vh,6rem) clamp(1.5rem,4vw,4rem);position:relative;overflow:hidden}
.stats-grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center;position:relative;z-index:2}
.stat-item{padding:24px;background:transparent;border:none;transition:all .3s cubic-bezier(.16,1,.3,1)}
.stat-item:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.stat-item h3{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;color:var(--text-primary);letter-spacing:-0.03em}
.stat-item p{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-tertiary);margin-top:6px}

/* HOME COLLECTION SECTIONS */
.home-section{padding:clamp(5rem,10vh,8rem) clamp(1.5rem,4vw,4rem);position:relative;overflow:hidden}
.home-section.aurora-bg{}
.hs-inner{max-width:1400px;margin:0 auto;position:relative;z-index:2}
.hs-header{display:flex;align-items:baseline;gap:14px;margin-bottom:32px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:16px}
.hs-header h2{font-size:clamp(1.2rem,3vw,1.8rem);font-weight:700;letter-spacing:-0.02em;color:var(--text-primary);flex:1;text-transform:uppercase}
.hs-btn{padding:0.6rem 1.4rem;border:1px solid rgba(255,255,255,.3);color:#fff;background:none;font-size:0.65rem;font-weight:500;text-transform:uppercase;letter-spacing:0.12em;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1)}
.hs-btn:hover{background:#fff;color:#000;border-color:#fff}

/* FEATURED */
.hs-featured{background:transparent;position:relative}
.hs-featured .collection-card{border:none}
.hs-featured .collection-card:hover{box-shadow:none}

/* PROMO */
.hs-promo{background:transparent;position:relative}
.hs-promo .collection-card{border:none}
.hs-promo .collection-card:hover{box-shadow:none}
.hs-promo .promo-badge{animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.promo-canvas{display:none}
.hs-promo .hs-inner{position:relative;z-index:2}

/* NEW */
.hs-new{background:transparent;position:relative}
.hs-new .collection-card{border:none}
.hs-new .collection-card:hover{box-shadow:none}
.hs-new .collection-grid{grid-template-columns:repeat(3,1fr)}
.hs-new .collection-card,.hs-new .collection-card:nth-child(1){grid-column:span 1;aspect-ratio:3/4}

/* LIMITED */
.hs-limited{background:transparent;position:relative}
.hs-limited .collection-card{border:none}
.hs-limited .collection-card:hover{box-shadow:none}

/* NEON CANVAS */
.neon-canvas{display:none}
.hs-featured .hs-inner,.hs-new .hs-inner,.hs-limited .hs-inner{position:relative;z-index:2}

/* PRODUCTS PAGE - Categories */
.products-page{padding:60px 40px;max-width:1440px;margin:0 auto}
.products-hero{margin-bottom:40px}
.products-hero h2{font-size:clamp(28px,4vw,44px);font-weight:900;letter-spacing:-2px;margin-bottom:6px;color:#f5f5f5}
.products-hero p{font-size:13px;color:#999}
.cat-nav{display:flex;gap:8px;margin-bottom:40px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-nav-btn{padding:0.6rem 1.5rem;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;transition:all .3s cubic-bezier(.16,1,.3,1);white-space:nowrap;cursor:pointer;color:#b0b0b0;border-radius:0}
.cat-nav-btn:hover{border-color:#000;color:#000}
.cat-nav-btn.active{background:#000;color:#fff;border-color:#000}
.cat-section{margin-bottom:48px;animation:catReveal .6s ease both}
.cat-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.cat-section-header h3{font-size:18px;font-weight:800;letter-spacing:-0.5px;color:#f5f5f5}
.cat-section-header span{font-size:11px;color:#777;font-weight:600}
@keyframes catReveal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes sparkle{0%{opacity:0;transform:translateY(0) scale(0)}10%{opacity:.6;transform:translateY(-5px) scale(.8)}30%{opacity:.8;transform:translateY(-15px) scale(1)}60%{opacity:.4;transform:translateY(-35px) scale(.7)}100%{opacity:0;transform:translateY(-60px) scale(0)}}
.cat-section:nth-child(2){animation-delay:.1s}
.cat-section:nth-child(3){animation-delay:.2s}
.cat-section:nth-child(4){animation-delay:.3s}
.cat-section:nth-child(5){animation-delay:.4s}

/* REVEAL ANIMATIONS - DISABLED */
.reveal{opacity:1;transform:none}
.reveal.visible{opacity:1;transform:none}
.reveal-delay-1{transition-delay:0s}
.reveal-delay-2{transition-delay:0s}
.reveal-delay-3{transition-delay:0s}

/* GLASSMORPHISM */
.p-card{position:relative;overflow:hidden;background:rgba(255,255,255,.04);transition:transform .2s ease-out,box-shadow .3s ease;cursor:pointer;border:1px solid rgba(255,255,255,.06);border-radius:0;--x:50%;--y:50%}
.p-card::after{content:none}
.p-card:hover::after{opacity:0}
.p-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:#ccc}
.p-card-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;transform:none;opacity:1;transition:var(--transition);border-top:1px solid rgba(255,255,255,.1)}
.p-card:hover .p-card-overlay{transform:translateY(0);opacity:1}
.collection-card{position:relative;overflow:hidden;background:#000;transition:transform .2s ease-out;border:none;cursor:pointer;--x:50%;--y:50%}
.collection-card::after{content:none}
.collection-card:hover::after{opacity:0}
.collection-card:hover{transform:none;box-shadow:none}
.collection-card-info{position:absolute;bottom:0;left:0;right:0;padding:16px 18px;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%)}

/* SEARCH */
.search-wrapper{position:relative}
.search-toggle{background:none;border:none;font-size:16px;color:rgba(255,255,255,.6);padding:8px;cursor:pointer;transition:var(--transition)}
.search-toggle:hover{color:#fff}
.search-box{position:absolute;top:100%;right:0;width:0;opacity:0;overflow:hidden;transition:all .3s ease;background:#fff;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:100}
.search-box.open{width:320px;opacity:1;padding:12px}
.search-box input{width:100%;padding:10px 12px;border:1.5px solid #eee;font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#000}
.search-results{max-height:300px;overflow-y:auto;margin-top:8px}
.search-item{display:flex;align-items:center;gap:10px;padding:8px;cursor:pointer;transition:background .2s;border-radius:4px}
.search-item:hover{background:#f5f5f5}
.search-item img{width:40px;height:40px;object-fit:cover;border-radius:4px}
.search-item-info h4{font-size:12px;font-weight:700;margin-bottom:2px}
.search-item-info span{font-size:11px;color:#888}
.search-no-results{padding:16px;text-align:center;color:#999;font-size:12px}

/* COLLECTION / PROMO */
.collection-section{padding:80px 40px;background:#000;color:#fff;position:relative;overflow:hidden}
.collection-section::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#111 0%,#000 100%)}
.collection-inner{position:relative;z-index:2;max-width:1440px;margin:0 auto}
.collection-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px}
.collection-header h2{font-size:clamp(28px,4vw,44px);font-weight:900;letter-spacing:-2px}
.countdown{display:flex;gap:12px}
.countdown-item{text-align:center;background:rgba(255,255,255,.08);padding:12px 16px;min-width:60px}
.countdown-item .num{font-size:28px;font-weight:900;display:block}
.countdown-item .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.5)}
.collection-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.collection-card:nth-child(1){grid-column:span 2;grid-row:span 1}
.collection-card:nth-child(2){grid-column:span 1;grid-row:span 1}
.collection-card:nth-child(3){grid-column:span 1;grid-row:span 1}
.collection-card:nth-child(4){grid-column:span 1;grid-row:span 1}
.collection-card:nth-child(5){grid-column:span 1;grid-row:span 1}
.collection-card:nth-child(n+6){grid-column:span 1;grid-row:span 1}
.collection-card{aspect-ratio:3/4}
.collection-card:nth-child(1){aspect-ratio:4/3}
.collection-card img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.collection-card:hover img{transform:scale(1.03)}
.collection-card-info h3{font-size:0.85rem;font-weight:600;color:#fff;letter-spacing:-0.02em}
.collection-card-info .old-price{text-decoration:line-through;color:rgba(255,255,255,.5);font-size:0.75rem;margin-right:8px}
.collection-card-info .new-price{font-size:1rem;font-weight:700;color:#fff}
.collection-card-urgency{display:block;font-size:0.7rem;color:rgba(255,255,255,.75);margin-top:6px;font-weight:400;letter-spacing:0.02em}
.collection-card-cta{position:absolute;bottom:0;left:0;right:0;padding:12px;text-align:center;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#fff;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;transform:translateY(100%);transition:all .3s cubic-bezier(.16,1,.3,1)}
.collection-card:hover .collection-card-cta{opacity:1;transform:translateY(0)}
.hs-subtitle{font-size:0.8rem;color:var(--text-tertiary);margin-top:6px;font-weight:400;letter-spacing:0.02em}

/* NEW COLLECTION SIDEBAR */
.hs-new-layout{display:grid;grid-template-columns:1fr 2.2fr;gap:0;align-items:stretch}
.hs-new-sidebar{display:flex;flex-direction:column;justify-content:center;padding:40px 48px 40px 0;border-right:1px solid rgba(255,255,255,.08);position:relative}
.hs-new-sidebar::after{content:'';position:absolute;top:20%;right:0;width:1px;height:60%;background:linear-gradient(180deg,transparent,rgba(212,175,55,.4),transparent)}
.hs-new-tagline{font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.2em;color:var(--text-muted);margin-bottom:16px}
.hs-new-headline{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:900;letter-spacing:-0.03em;line-height:1.1;color:var(--text-primary);margin-bottom:16px}
.hs-new-desc{font-size:0.82rem;color:var(--text-tertiary);line-height:1.7;margin-bottom:28px;max-width:320px}
.hs-new-stats{display:flex;flex-direction:column;gap:14px;margin-bottom:32px}
.hs-new-stat{display:flex;align-items:center;gap:10px;font-size:0.72rem;color:var(--text-secondary);font-weight:500;letter-spacing:0.01em}
.hs-new-stat::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0;transition:background .3s}
.hs-new-stat.stat-hot::before{background:#d4af37}
.hs-new-stat.stat-warn::before{background:#CF6679}
.hs-new-stat.stat-info::before{background:var(--text-tertiary)}
.hs-new-cta{align-self:flex-start;padding:14px 32px;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--text-primary);font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);font-family:var(--font)}
.hs-new-cta:hover{background:var(--text-primary);color:var(--bg-base);border-color:var(--text-primary)}
.hs-new-cards{padding-left:32px}
.hs-new-banner-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;height:400px}
.hs-new-banner-main{position:relative;overflow:hidden;border-radius:4px;height:100%}
.hs-new-banner-main img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.hs-new-banner-main:hover img{transform:scale(1.03)}
.hs-new-banner-main .hs-new-banner-label{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.7);color:#fff;padding:6px 14px;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;backdrop-filter:blur(4px)}
.hs-new-side-cards{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;height:100%}
.hs-new-side-card{position:relative;overflow:hidden;border-radius:4px;cursor:pointer;height:100%}
.hs-new-side-card img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.hs-new-side-card:hover img{transform:scale(1.05)}
.hs-new-side-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.4) 0%,transparent 50%);opacity:0;transition:opacity .3s}
.hs-new-side-card:hover::after{opacity:1}
@media(max-width:768px){
.hs-new-layout{grid-template-columns:1fr;gap:32px}
.hs-new-sidebar{padding:0 0 24px 0;border-right:none;border-bottom:1px solid rgba(255,255,255,.08)}
.hs-new-sidebar::after{top:auto;bottom:0;right:20%;left:20%;width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.4),transparent)}
.hs-new-cards{padding-left:0}
.hs-new-banner-grid{grid-template-columns:1fr;height:auto}
.hs-new-banner-main{height:200px}
.hs-new-side-cards{grid-template-columns:1fr 1fr;height:auto}
.hs-new-side-card{height:120px}
}
.collection-card .promo-badge{position:absolute;top:12px;left:12px;background:#fff;color:#000;padding:5px 12px;font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.no-promo{text-align:center;padding:60px;color:rgba(255,255,255,.4);font-size:14px}

/* PRODUCTS */
.products-page{padding:clamp(3rem,6vh,5rem) clamp(1.5rem,4vw,4rem);max-width:1400px;margin:0 auto}
.section-title{font-size:clamp(1.5rem,3.5vw,2.5rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:40px;color:var(--text-primary)}
.section-sub{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-tertiary);margin-bottom:8px;font-weight:400}
.filters{display:flex;gap:6px;margin-bottom:32px;flex-wrap:wrap}
.filters button{padding:8px 20px;border:1px solid var(--border-subtle);background:transparent;font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);transition:all .3s cubic-bezier(.16,1,.3,1)}
.filters button:hover,.filters button.active{background:var(--text-primary);color:var(--bg-base);border-color:var(--text-primary)}
.p-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;overflow:visible}
.p-grid:hover .p-card{opacity:1;transition:opacity .4s ease}
.p-grid:hover .p-card:hover{opacity:1}
.p-card img{width:100%;aspect-ratio:1/1;object-fit:cover;transition:transform .6s cubic-bezier(.16,1,.3,1);display:block}
.p-card-img-wrap{position:relative;overflow:hidden}
.p-card-info{padding:18px 16px 20px;display:flex;flex-direction:column;gap:6px}
.p-card-cat{font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#999}
.p-card-name{font-size:0.95rem;font-weight:700;color:#f5f5f5;line-height:1.4}
.p-card-price-row{display:flex;align-items:baseline;gap:10px;margin-top:6px}
.p-card-price{font-size:1.1rem;font-weight:800;color:#f5f5f5}
.p-card-installment{font-size:0.65rem;color:#777;font-weight:400}
.p-card-colors{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.p-card-sizes{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.p-card-sizes span{font-size:0.6rem;font-weight:600;color:#b0b0b0;background:rgba(255,255,255,.06);padding:4px 8px;border:1px solid rgba(255,255,255,.1);border-radius:0}
.p-card:hover img{transform:scale(1.03)}
.p-card-overlay h3{font-size:13px;font-weight:700;margin-bottom:2px}
.p-card-overlay .price{font-size:17px;font-weight:900}
.p-card-actions{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:6px;opacity:0;transform:translateX(8px);transition:all .3s cubic-bezier(.16,1,.3,1)}
.p-card:hover .p-card-actions{opacity:1;transform:translateX(0)}
.p-card-actions button{width:34px;height:34px;border-radius:0;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(.16,1,.3,1);font-size:13px;color:#fff}
.p-card-actions button:hover{background:#d4af37;color:#000;border-color:#d4af37}
.p-card-actions button.fav-active{background:#d4af37;color:#000;border-color:#d4af37}
.p-card-quick{position:absolute;bottom:10px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(0,0,0,.85);backdrop-filter:blur(4px);color:#fff;border:none;padding:8px 16px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);white-space:nowrap}
.p-card:hover .p-card-quick{opacity:1;transform:translateX(-50%) translateY(0)}
.p-card-quick:hover{background:#d4af37;color:#000}
.p-card-sold-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 16px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;z-index:4}

/* PRODUCT DETAIL */
.product-detail{padding:40px clamp(1.5rem,4vw,4rem);max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.2fr 1fr;gap:48px;align-items:start}
.pd-gallery-wrapper{display:flex;gap:10px}
.pd-thumbs-side{display:flex;flex-direction:column;gap:6px;width:64px;flex-shrink:0}
.pd-thumbs-side .pd-thumb{width:64px;height:64px;object-fit:cover;border:2px solid transparent;cursor:pointer;transition:all .2s;border-radius:0;opacity:.5}
.pd-thumbs-side .pd-thumb:hover,.pd-thumbs-side .pd-thumb.active{border-color:#000;opacity:1}
.pd-gallery{position:relative;overflow:hidden;background:#f8f8f8;border-radius:0;flex:1}
.pd-gallery img#pdMainImg{width:100%;height:560px;object-fit:cover;transition:transform .4s}
.pd-gallery:hover img#pdMainImg{transform:scale(1.02)}
.pd-gallery .pd-badge{position:absolute;top:16px;left:16px;background:#000;color:#fff;padding:6px 14px;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;border-radius:0}
.pd-img-counter{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.7);color:#fff;padding:5px 10px;font-size:10px;font-weight:600;border-radius:0;backdrop-filter:blur(4px);display:flex;align-items:center;gap:5px}
.pd-info{padding-top:8px}
.pd-info h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;color:#000}
.pd-info .pd-cat{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#888;margin-bottom:20px;font-weight:500}
.pd-info .pd-price{font-size:26px;font-weight:800;margin-bottom:4px;color:#f5f5f5}
.pd-info .pd-installments{font-size:12px;color:#777;margin-bottom:28px}
.pd-info .pd-desc{font-size:13px;color:#999;line-height:1.9;margin-bottom:28px;border-top:1px solid rgba(255,255,255,.06);padding-top:20px}
.pd-info .pd-features{margin-bottom:28px;padding:18px;background:rgba(255,255,255,.03);border-radius:0;border:1px solid rgba(255,255,255,.06)}
.pd-info .pd-features h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#777;margin-bottom:12px}
.pd-info .pd-features ul{list-style:none;padding:0}
.pd-info .pd-features li{font-size:12px;padding:5px 0;display:flex;align-items:center;gap:10px;color:#444}
.pd-info .pd-features li i{color:#000;font-size:10px}
.pd-info .pd-sizes{margin-bottom:28px}
.pd-info .pd-sizes label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:12px;color:#f5f5f5}
.size-options{display:flex;gap:8px;flex-wrap:wrap}
.size-options button{width:46px;height:46px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);font-size:12px;font-weight:700;color:#f5f5f5;transition:var(--transition);border-radius:0}
.size-options button:hover,.size-options button.active{background:#000;color:#fff;border-color:#000}
.size-options button.disabled{opacity:.3;cursor:not-allowed;text-decoration:line-through}
.pd-actions{display:flex;gap:10px;margin-bottom:28px}
.pd-actions .btn-add{flex:1;padding:18px;background:#fff;color:#000;border:none;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;transition:var(--transition);border-radius:0}
.pd-actions .btn-add:hover{background:#222}
.pd-actions .btn-fav{width:54px;height:54px;border:1.5px solid rgba(255,255,255,.15);background:transparent;display:flex;align-items:center;justify-content:center;font-size:18px;color:#f5f5f5;transition:var(--transition);border-radius:0}
.pd-actions .btn-fav:hover,.pd-actions .btn-fav.active{background:#000;color:#fff;border-color:#000}
.pd-shipping{padding:14px 16px;border:1px solid rgba(255,255,255,.08);border-radius:0;display:flex;align-items:center;gap:10px;font-size:11px;color:#999;margin-bottom:12px}
.pd-shipping i{font-size:14px;color:#d4af37}
.pd-share{display:flex;gap:8px;align-items:center;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
.pd-share span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#777}
.pd-share button{width:32px;height:32px;border-radius:0;border:1px solid rgba(255,255,255,.1);background:transparent;display:flex;align-items:center;justify-content:center;font-size:12px;color:#999;cursor:pointer;transition:var(--transition)}
.pd-share button:hover{background:#000;color:#fff;border-color:#000}
.pd-related{padding:48px clamp(1.5rem,4vw,4rem);max-width:1200px;margin:0 auto}
.pd-related h3{font-size:14px;font-weight:700;margin-bottom:20px;letter-spacing:0.05em;text-transform:uppercase;color:#000}
.pd-related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

/* TYPEWRITER */
.typewriter{overflow:hidden;border-right:3px solid #fff;white-space:nowrap;animation:typing 3s steps(30) 1s both,blink .7s step-end infinite}
@keyframes typing{from{width:0}to{width:100%}}
@keyframes blink{50%{border-color:transparent}}

/* BACK TO TOP */
.back-to-top{position:fixed;bottom:24px;left:24px;width:44px;height:44px;background:#000;color:#fff;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;z-index:8000;opacity:0;transform:translateY(20px);transition:all .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.back-to-top.visible{opacity:1;transform:translateY(0)}
.back-to-top:hover{background:#333;transform:translateY(-2px)}

/* CART */
.cart-page{padding:40px clamp(1.5rem,4vw,4rem);max-width:1200px;margin:0 auto}
#page-cart{position:relative;overflow:hidden;background:#fff}
#galaxyCanvas{display:none}
.cart-grid{display:grid;grid-template-columns:1fr 320px;gap:40px;align-items:start}
.cart-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.cart-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);overflow:hidden;position:relative}
.cart-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.cart-card-body{padding:14px 16px}
.cart-card-body h4{font-size:13px;font-weight:700;color:#f5f5f5;margin-bottom:4px}
.cart-card-body .cart-card-meta{font-size:11px;color:#777;margin-bottom:8px}
.cart-card-body .cart-card-price{font-size:16px;font-weight:800;color:#d4af37;margin-bottom:12px}
.cart-card-qty{display:flex;align-items:center;gap:10px}

.cart-row{display:flex;gap:20px;padding:20px 0;border-bottom:1px solid #eee;align-items:center}

.cart-row-info{flex:1}

.cart-qty button{width:30px;height:30px;border:1px solid #ddd;background:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:var(--transition)}

/* PROFILE / CHECKOUT */
.profile-page{padding:60px 40px;max-width:800px;margin:0 auto}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;color:var(--gray3)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border-subtle);font-size:13px;font-family:var(--font);transition:all .2s cubic-bezier(.16,1,.3,1);background:var(--bg-primary);border-radius:6px;min-height:44px}

.btn-black:hover{background:#333}
.btn-outline{padding:12px 24px;background:#fff;color:#000;border:1.5px solid #000;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:var(--transition)}
.btn-outline:hover{background:#000;color:#fff}
.profile-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1.5px solid #eee}
.ptab{padding:12px 20px;background:none;border:none;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#999;transition:var(--transition);border-bottom:2px solid transparent}

/* FOOTER */
.footer{background:var(--bg-base);color:var(--text-secondary);padding:clamp(4rem,8vh,6rem) clamp(1.5rem,4vw,4rem) 2rem;position:relative;overflow:hidden}
.footer-grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4rem;margin-bottom:4rem}

.footer-col h4{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px;color:var(--text-tertiary);font-weight:500}

.admin-link{color:rgba(255,255,255,.08);font-size:8px;cursor:pointer;transition:var(--transition);margin-top:14px;text-align:center}
.admin-link:hover{color:rgba(255,255,255,.3)}

/* ADMIN SAVE BUTTON */
.admin-save-btn{position:fixed;bottom:24px;right:24px;background:#000;color:#fff;border:none;padding:14px 28px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;border-radius:8px;cursor:pointer;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:saveIn .3s ease;transition:transform .2s,background .2s}

[data-theme="dark"] .admin-save-btn{background:#000;color:#fff}
[data-theme="dark"] .admin-save-btn:hover{background:#222}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:5000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal.active{display:flex}
.modal-box{background:#fff;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;padding:36px;position:relative;animation:mi .25s ease}
@keyframes mi{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;color:#999}
.modal-box h2{font-size:20px;font-weight:900;margin-bottom:18px;letter-spacing:-1px}
.submit-btn{width:100%;padding:13px;background:#000;color:#fff;border:none;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:var(--transition)}
.submit-btn:hover{background:#333}

.admin-sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.06)}
.admin-main{padding:32px 40px;overflow-y:auto;max-height:calc(100vh - 60px)}
.admin-tabs{display:none}
.admin-top-bar{display:none}
.atab{padding:10px 16px;background:none;border:none;font-size:12px;font-weight:500;color:#999;transition:all .2s;border-radius:6px;white-space:nowrap;display:flex;align-items:center;gap:10px;cursor:pointer}

.atab:hover{color:#f5f5f5;background:rgba(255,255,255,.04)}
.atab.active{color:#fff;background:rgba(212,175,55,.1)}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:36px}
.admin-stat{background:var(--bg-elevated);padding:28px 20px;text-align:center;transition:all .25s cubic-bezier(.16,1,.3,1);border-radius:12px;border:1px solid var(--border-subtle)}

.admin-stat p{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;margin-top:6px;font-weight:500}
.admin-section{margin-bottom:36px}
.admin-section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border-subtle)}

.admin-row{display:flex;gap:16px;padding:16px 18px;background:var(--bg-elevated);margin-bottom:8px;align-items:center;transition:all .25s cubic-bezier(.16,1,.3,1);border-radius:10px;border:1px solid var(--border-subtle)}
.admin-row:hover{border-color:var(--border-medium);box-shadow:0 4px 16px rgba(0,0,0,.04)}
.admin-row img{width:56px;height:56px;object-fit:cover;border-radius:8px}
.admin-row .info{flex:1}
.admin-row .info h4{font-size:13px;font-weight:700;margin-bottom:3px}
.admin-row .info p{font-size:11px;color:var(--text-muted)}
.admin-row .actions{display:flex;gap:8px}
.admin-row .actions button{padding:8px 16px;border:none;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;transition:all .2s cubic-bezier(.16,1,.3,1);border-radius:6px;cursor:pointer}
.btn-e{background:#000;color:#fff;border-radius:6px}
.btn-e:hover{background:#222}
.btn-d{background:transparent;color:var(--text-primary);border:1px solid var(--border-medium);border-radius:6px}
.btn-d:hover{background:var(--text-primary);color:var(--bg-base);border-color:var(--text-primary)}
.admin-cat-list{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

.admin-shortcut-btn{display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 16px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:10px;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1);font-family:var(--font)}
.admin-shortcut-btn:hover{border-color:var(--border-medium);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.admin-shortcut-btn i{font-size:18px;color:var(--text-tertiary)}
.admin-shortcut-btn span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-secondary)}
.admin-top-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:8px}

.vitrine-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:4px 0;margin-bottom:0}

.vitrine-header:hover{opacity:.7}
.vitrine-arrow{font-size:12px;color:var(--gray3);transition:transform .3s ease}
.vitrine-body{padding-top:16px;animation:fadeIn .3s ease}
.toggle-switch{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.toggle-switch input[type=checkbox]{width:40px;height:22px;appearance:none;background:#ddd;border-radius:11px;position:relative;cursor:pointer;transition:var(--transition)}
.toggle-switch input[type=checkbox]:checked{background:#000}
.toggle-switch input[type=checkbox]::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:var(--transition)}

.order-row{display:flex;gap:14px;padding:16px;background:var(--gray);margin-bottom:6px;align-items:center;border-radius:8px;border:1px solid var(--border,#eee)}

.export-btn{padding:10px 20px;background:#000;color:#fff;border:none;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:12px}

/* TILT 3D */

/* SMOOTH REVEALS */
.reveal{opacity:1;transform:none}
.reveal.visible{opacity:1;transform:none}
.reveal-left{opacity:1;transform:none}
.reveal-left.visible{opacity:1;transform:none}
.reveal-scale{opacity:1;transform:none}
.reveal-scale.visible{opacity:1;transform:none}

/* GLOW DIVIDER */
.glow-divider{display:none}

@media(min-width:769px){.cursor-dot,.cursor-ring{display:none}}

/* COLOR SYSTEM */

[data-theme="dark"] .pd-fabric{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06)}
[data-theme="dark"] .pd-fabric-weight{background:rgba(255,255,255,.1);color:#f5f5f5}

.color-list{margin-bottom:20px}

.color-palette-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1)}
.color-palette-dot:hover{transform:scale(1.15);border-color:#000}
.color-form{background:var(--gray);padding:16px;border-radius:8px;border:1px solid var(--border,#eee)}
.color-form h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

/* SIZE MODAL */
.size-modal-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.size-modal-header img{width:50px;height:50px;object-fit:cover;border-radius:4px}
.size-modal-header h2{font-size:18px;font-weight:900;letter-spacing:-0.5px;margin:0}
.size-modal-subtitle{font-size:12px;color:#888;margin-bottom:20px}
.size-legend{display:flex;gap:16px;margin-bottom:20px;padding:10px 14px;background:#f9f9f9;border-radius:6px;font-size:11px;font-weight:600}
.size-legend span{display:flex;align-items:center;gap:6px}
.size-legend .dot{width:10px;height:10px;border-radius:50%}
.size-legend .dot.green{background:#d4af37}
.size-legend .dot.red{background:#CF6679}
.size-modal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:10px;margin-bottom:24px}
.size-btn{width:100%;height:70px;border-radius:8px;border:2px solid #ddd;background:#fff;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative}
.size-btn i{font-size:11px}
.size-btn.available{border-color:#d4af37;background:rgba(212,175,55,.05);color:#d4af37}
.size-btn.available:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(76,175,80,.25)}
.size-btn.unavailable{border-color:#CF6679;background:rgba(207,102,121,.05);color:#CF6679;text-decoration:line-through}
.size-btn.unavailable:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(244,67,54,.25)}
.size-add-section{border-top:1.5px solid #eee;padding-top:18px}
.size-add-section label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#999;display:block;margin-bottom:8px}
.size-add-row{display:flex;gap:8px}
.size-add-row input{flex:1;padding:12px 14px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;font-family:var(--font);transition:border-color .2s}
.size-add-row input:focus{outline:none;border-color:#000}
.size-add-row button{padding:12px 20px;background:#000;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;transition:background .2s}
.size-add-row button:hover{background:#333}
.size-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;margin:1px 2px}
.size-chip.available{background:rgba(212,175,55,.1);color:#d4af37}
.size-chip.unavailable{background:rgba(207,102,121,.08);color:#CF6679;text-decoration:line-through}

/* EDITABLE */
.editable-mode [data-editable]{outline:2px dashed #000;outline-offset:3px;cursor:text}
.editable-mode [data-editable]:focus{outline:2px solid #000;background:rgba(0,0,0,.02)}
.edit-indicator{position:fixed;top:64px;right:16px;background:#000;color:#fff;padding:8px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;z-index:9000;display:none}
.edit-indicator.active{display:block}

/* TOAST */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:#000;color:#fff;padding:12px 18px;font-size:11px;font-weight:600;transform:translateX(120%);transition:transform .3s ease;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateX(0)}
.toast.success{border-left:3px solid #d4af37}
.toast.error{border-left:3px solid #CF6679}

.empty-state{text-align:center;padding:60px 20px;color:#bbb}
.empty-state i{font-size:36px;margin-bottom:10px;display:block}
.marquee{background:#000;padding:12px 0;overflow:hidden;white-space:nowrap;border-top:1px solid #222}
.marquee-inner{display:inline-block;animation:mq 22s linear infinite}
.marquee-inner span{display:inline-block;padding:0 40px;font-size:11px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:3px}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ========== 21ST.DEV INSPIRED EFFECTS ========== */

/* SCROLL PROGRESS BAR */
.scroll-progress{position:fixed;top:0;left:0;width:0%;height:3px;background:linear-gradient(90deg,#fff,rgba(255,255,255,.6),#fff);background-size:200% 100%;animation:scrollGradient 3s linear infinite;z-index:10001;transition:width .1s linear;box-shadow:0 0 10px rgba(255,255,255,.4),0 0 20px rgba(255,255,255,.1)}
@keyframes scrollGradient{0%{background-position:200% 0}100%{background-position:-200% 0}}
[data-theme="dark"] .scroll-progress{background:linear-gradient(90deg,#fff,rgba(255,255,255,.4),#fff);background-size:200% 100%;animation:scrollGradient 3s linear infinite}

/* FLOATING 3D SHAPES - ULTRA CREATIVE */
.floating-shapes{position:absolute;inset:0;z-index:1;pointer-events:none;perspective:1200px;overflow:hidden}
.shape-3d{position:absolute;transform-style:preserve-3d;opacity:.12}
.shape-cube{width:60px;height:60px;transform-style:preserve-3d;animation:cubeRotate 20s linear infinite}
.shape-cube .face{position:absolute;width:60px;height:60px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.01)}
.shape-cube .front{transform:translateZ(30px)}
.shape-cube .back{transform:translateZ(-30px) rotateY(180deg)}
.shape-cube .left{transform:translateX(-30px) rotateY(-90deg)}
.shape-cube .right{transform:translateX(30px) rotateY(90deg)}
.shape-cube .top{transform:translateY(-30px) rotateX(90deg)}
.shape-cube .bottom{transform:translateY(30px) rotateX(-90deg)}
@keyframes cubeRotate{0%{transform:rotateX(0) rotateY(0) rotateZ(0)}100%{transform:rotateX(360deg) rotateY(360deg) rotateZ(180deg)}}

.shape-torus{width:90px;height:90px;border-radius:50%;border:3px solid rgba(255,255,255,.15);transform-style:preserve-3d;animation:torusRotate 15s linear infinite;position:relative}
.shape-torus::before{content:'';position:absolute;inset:12px;border-radius:50%;border:2px solid rgba(255,255,255,.1);transform:rotateX(60deg)}
.shape-torus::after{content:'';position:absolute;inset:6px;border-radius:50%;border:1.5px dashed rgba(255,255,255,.08);transform:rotateY(45deg)}
@keyframes torusRotate{0%{transform:rotateX(0) rotateY(0)}100%{transform:rotateX(360deg) rotateY(180deg)}}

.shape-octahedron{width:50px;height:50px;transform-style:preserve-3d;animation:octaRotate 18s linear infinite;position:relative}
.shape-octahedron::before{content:'';position:absolute;width:0;height:0;border-left:25px solid transparent;border-right:25px solid transparent;border-bottom:35px solid rgba(255,255,255,.08);top:0;left:0}
.shape-octahedron::after{content:'';position:absolute;width:0;height:0;border-left:25px solid transparent;border-right:25px solid transparent;border-top:35px solid rgba(255,255,255,.06);bottom:0;left:0}
@keyframes octaRotate{0%{transform:rotateX(0) rotateY(0) rotateZ(0)}100%{transform:rotateX(180deg) rotateY(360deg) rotateZ(90deg)}}

.shape-helix{width:4px;height:80px;position:relative;transform-style:preserve-3d;animation:helixSpin 12s linear infinite}
.shape-helix-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);left:50%;transform:translateX(-50%)}
@keyframes helixSpin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}

.shape-cross{width:60px;height:60px;position:relative;transform-style:preserve-3d;animation:crossFloat 10s ease-in-out infinite}
.shape-cross::before{content:'';position:absolute;top:50%;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transform:translateY(-50%)}
.shape-cross::after{content:'';position:absolute;left:50%;top:0;width:2px;height:100%;background:linear-gradient(180deg,transparent,rgba(255,255,255,.2),transparent);transform:translateX(-50%)}
@keyframes crossFloat{0%,100%{transform:rotateZ(0) scale(1)}50%{transform:rotateZ(90deg) scale(1.2)}}

.shape-orbit{width:100px;height:100px;border-radius:50%;border:1px solid rgba(255,255,255,.06);position:relative;transform-style:preserve-3d;animation:orbitTilt 25s linear infinite}
.shape-orbit::before{content:'';position:absolute;width:8px;height:8px;background:rgba(255,255,255,.3);border-radius:50%;top:-4px;left:50%;transform:translateX(-50%);box-shadow:0 0 10px rgba(255,255,255,.2)}
.shape-orbit::after{content:'';position:absolute;inset:15px;border-radius:50%;border:1px dashed rgba(255,255,255,.04)}
@keyframes orbitTilt{0%{transform:rotateX(60deg) rotateZ(0)}100%{transform:rotateX(60deg) rotateZ(360deg)}}

/* Positions - corners and edges only, never center */
.shape-3d:nth-child(1){top:8%;right:6%;opacity:.1}
.shape-3d:nth-child(2){bottom:12%;left:4%;opacity:.08}
.shape-3d:nth-child(3){top:55%;right:3%;opacity:.07}
.shape-3d:nth-child(4){top:20%;left:3%;opacity:.09}
.shape-3d:nth-child(5){bottom:8%;right:12%;opacity:.06}
.shape-3d:nth-child(6){top:70%;left:8%;opacity:.05}

/* SECTION FLOATING ACCENTS - subtle 3D near sections */
.section-3d-accent{position:absolute;pointer-events:none;z-index:0;opacity:.06}
.accent-ring{width:120px;height:120px;border:2px solid rgba(255,255,255,.15);border-radius:50%;transform-style:preserve-3d;animation:accentSpin 20s linear infinite}
.accent-ring::before{content:'';position:absolute;inset:20px;border:1px solid rgba(255,255,255,.08);border-radius:50%;transform:rotateX(70deg)}
@keyframes accentSpin{0%{transform:rotateX(70deg) rotateZ(0)}100%{transform:rotateX(70deg) rotateZ(360deg)}}

.accent-diamond{width:40px;height:40px;border:1.5px solid rgba(255,255,255,.12);transform:rotate(45deg);animation:diamondPulse 6s ease-in-out infinite}
@keyframes diamondPulse{0%,100%{transform:rotate(45deg) scale(1);opacity:.06}50%{transform:rotate(45deg) scale(1.3);opacity:.12}}

/* MAGNETIC BUTTON */
.magnetic-btn{transition:transform .3s cubic-bezier(.25,.8,.25,1)}
.magnetic-btn:hover{transition:transform .15s cubic-bezier(.25,.8,.25,1)}

/* TEXT SPLIT REVEAL */
.split-word{display:inline-block;overflow:hidden;vertical-align:top}
.split-word .word-inner{display:inline-block;opacity:1;transform:none}
.split-word.revealed .word-inner{transform:none;opacity:1}

/* GLOW CURSOR TRAIL */
.glow-trail{position:fixed;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:opacity .4s;opacity:0}
.glow-trail.active{opacity:1}
[data-theme="dark"] .glow-trail{background:radial-gradient(circle,rgba(255,255,255,.04) 0%,transparent 70%)}

/* SCROLL-DRIVEN 3D SECTIONS */
.scroll-3d{transform:perspective(1200px) rotateX(0deg);transition:transform .1s linear,opacity .3s,filter .3s;will-change:transform}
.scroll-3d.entering{transform:perspective(1200px) rotateX(2deg) scale(.96);opacity:.7;filter:blur(2px)}
.scroll-3d.visible-3d{transform:perspective(1200px) rotateX(0deg) scale(1);opacity:1;filter:blur(0px)}

/* ENHANCED REVEAL - MORE DRAMATIC */
.reveal-3d{opacity:1;transform:none}
.reveal-3d.visible{opacity:1;transform:none}
.reveal-up{opacity:1;transform:none;filter:none}
.reveal-up.visible{opacity:1;transform:none;filter:none}

/* COUNTER ANIMATION */
.counter-animated{display:inline-block;transition:transform .3s}

/* ENHANCED LOADER */
#loader{background:#000;overflow:hidden}
#loader .loader-particles{position:absolute;inset:0}
#loader .loader-particle{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;opacity:0}
#loader.hidden{opacity:0;visibility:hidden;pointer-events:none}

/* BIG TEXT 3D PARALLAX */
.big-text-section{perspective:800px;overflow:hidden;padding:80px 0;background:#000;position:relative}
.big-text-scroll{font-size:clamp(60px,12vw,160px);font-weight:900;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.15);white-space:nowrap;transform-style:preserve-3d;transition:transform .1s linear;letter-spacing:-4px}
[data-theme="dark"] .big-text-scroll{-webkit-text-stroke-color:rgba(255,255,255,.1)}

/* SECTION DIVIDER GLOW */
.section-glow{position:relative}
.section-glow::after{content:'';position:absolute;bottom:-2px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2) 30%,rgba(255,255,255,.4) 50%,rgba(255,255,255,.2) 70%,transparent);filter:blur(1px)}

/* SMOOTH CARD ENTRANCE */
.card-3d-enter{opacity:1;transform:none}
.card-3d-enter.visible{opacity:1;transform:none}

/* HERO ENHANCED */
.hero-content .hero-tag{animation:none;opacity:0;transform:translateY(20px);transition:all .8s cubic-bezier(.16,1,.3,1) .3s}
.hero-content .hero-tag.anim-in{opacity:.5;transform:translateY(0)}
.hero-content .hero-btn{animation:none;opacity:0;transform:translateY(20px);transition:all .8s cubic-bezier(.16,1,.3,1) .8s}
.hero-content .hero-btn.anim-in{opacity:1;transform:translateY(0)}
.hero-content p{animation:none;opacity:0;transform:translateY(20px);transition:all .8s cubic-bezier(.16,1,.3,1) .6s}
.hero-content p.anim-in{opacity:.5;transform:translateY(0)}

/* DARK STARS CANVAS */

#starsCanvas.active{opacity:1}

/* DARK THEME ENHANCED */
[data-theme="dark"] .hero{background:transparent}
[data-theme="dark"] .categories-section{background:transparent}
[data-theme="dark"] .stats-section{background:#000;border-color:#0a0a0a}
[data-theme="dark"] .home-section{background:transparent}
[data-theme="dark"] .footer{background:var(--bg-base)}
[data-theme="dark"] .glow-divider{background:var(--border-subtle)}
[data-theme="dark"] .scroll-progress{background:linear-gradient(90deg,rgba(255,255,255,.2),rgba(255,255,255,.7),rgba(255,255,255,.2));background-size:200% 100%}

/* BUTTONS - PREMIUM OUTLINE STYLE */
.btn-black,.btn-add,.btn-outline,.export-btn,.cart-summary button,.btn-e,.admin-save-btn{
  background:transparent;
  border:1px solid var(--border-strong);
  color:var(--text-primary);
  padding:0.9rem 2rem;
  font-size:0.75rem;
  font-weight:500;
  letter-spacing:0.1em;
  text-transform:uppercase;
  transition:all .3s cubic-bezier(.16,1,.3,1);
  position:relative;
  overflow:hidden;
}
.btn-black:hover,.btn-add:hover,.btn-outline:hover,.export-btn:hover,.cart-summary button:hover,.btn-e:hover,.admin-save-btn:hover{
  background:var(--text-primary);
  color:var(--bg-base);
  border-color:var(--text-primary);
}
.btn-black:active,.btn-add:active,.cart-summary button:active{
  transform:scale(.98);
}

/* PRODUCT CARDS */
.p-card{
  background:var(--bg-primary);
  border:1px solid var(--border-subtle);
  overflow:hidden;
  transition:all .4s cubic-bezier(.16,1,.3,1);
  position:relative;
  z-index:1;
}
